[package]
name = "agiworkforce-rmcp-client"
version = "0.1.0"
edition = "2024"


[dependencies]
anyhow = "1"
axum = { version = "0.8", default-features = false, features = [ "http1", "tokio", ]}
agiworkforce-api = { path = "../agiworkforce-api" }
agiworkforce-client = { path = "../agiworkforce-client" }
agiworkforce-config = { path = "../agiworkforce-config" }
agiworkforce-exec-server = { path = "../agiworkforce-exec-server" }
agiworkforce-keyring-store = { path = "../agiworkforce-keyring-store" }
agiworkforce-protocol = { path = "../agiworkforce-protocol" }
agiworkforce-utils-pty = { path = "../agiworkforce-utils-pty" }
agiworkforce-utils-home-dir = { path = "../agiworkforce-utils-home-dir" }
bytes = "1.10.1"
futures = { version = "0.3", default-features = false, features = ["std"]}
keyring = { version = "3.6", default-features = false , features = ["crypto-rust"]}
oauth2 = "5"
reqwest = { version = "0.12", default-features = false, features = [ "json", "stream", "rustls-tls", ] }
rmcp = { version = "0.15.0", default-features = false, features = [ "auth", "base64", "client", "macros", "schemars", "server", "transport-child-process", "transport-streamable-http-client-reqwest", "transport-streamable-http-server", ]}
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
sse-stream = "0.2.1"
thiserror = "2.0.17"
tiny_http = "0.12"
tokio = { version = "1", features = [ "io-util", "macros", "process", "rt-multi-thread", "sync", "io-std", "time", ] }
tracing = { version = "0.1.44", features = ["log"] }
urlencoding = "2.1"
webbrowser = "1.0"
which = "8"

[dev-dependencies]
agiworkforce-utils-cargo-bin = { path = "../agiworkforce-utils-cargo-bin" }
pretty_assertions = "1.4.1"
serial_test = "3.2.0"
tempfile = "3.23.0"
[target.'cfg(target_os = "linux")'.dependencies]
keyring = { version = "3.6", default-features = false , features = ["linux-native-async-persistent"]}

[target.'cfg(target_os = "macos")'.dependencies]
keyring = { version = "3.6", default-features = false , features = ["apple-native"]}

[target.'cfg(target_os = "windows")'.dependencies]
keyring = { version = "3.6", default-features = false , features = ["windows-native"]}

[target.'cfg(any(target_os = "freebsd", target_os = "openbsd"))'.dependencies]
keyring = { version = "3.6", default-features = false , features = ["sync-secret-service"]}
