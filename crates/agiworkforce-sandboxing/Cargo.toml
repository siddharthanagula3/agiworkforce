[package]
name = "agiworkforce-sandboxing"
version = "0.1.0"
edition = "2024"

[lib]
name = "agiworkforce_sandboxing"
path = "src/lib.rs"

[dependencies]
agiworkforce-network-proxy = { path = "../agiworkforce-network-proxy" }
agiworkforce-protocol = { path = "../agiworkforce-protocol" }
agiworkforce-utils-absolute-path = { path = "../agiworkforce-utils-absolute-path" }
dirs = "6"
dunce = "1.0.4"
libc = "0.2.182"
serde_json = "1"
tracing = { version = "0.1.44", features = ["log"] }
url = "2"

[dev-dependencies]
pretty_assertions = "1.4.1"
tempfile = "3.23.0"
