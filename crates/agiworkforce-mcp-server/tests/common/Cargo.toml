[package]
name = "mcp_test_support"
version = "0.1.0"
edition = "2024"


[lib]
path = "lib.rs"

[dependencies]
anyhow = "1"
agiworkforce-login = { path = "../agiworkforce-login" }
agiworkforce-mcp-server = { path = "../agiworkforce-mcp-server" }
agiworkforce-terminal-detection = { path = "../agiworkforce-terminal-detection" }
agiworkforce-utils-cargo-bin = { path = "../agiworkforce-utils-cargo-bin" }
rmcp = { version = "0.15.0", default-features = false }
os_info = "3.12.0"
pretty_assertions = "1.4.1"
serde = "1"
serde_json = "1"
tokio = { version = "1", features = [ "io-std", "macros", "process", "rt-multi-thread", ] }
wiremock = "0.6"
core_test_support = { path = "../../../core/tests/common" }
shlex = "1.3.0"
