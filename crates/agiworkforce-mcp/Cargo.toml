[package]
edition = "2024"

name = "agiworkforce-mcp"
version = "0.1.0"

[lib]
name = "agiworkforce_mcp"
path = "src/lib.rs"

[dependencies]
anyhow = "1"
async-channel = "2.3.1"
agiworkforce-async-utils = { path = "../agiworkforce-async-utils" }
agiworkforce-api = { path = "../agiworkforce-api" }
agiworkforce-config = { path = "../agiworkforce-config" }
agiworkforce-exec-server = { path = "../agiworkforce-exec-server" }
agiworkforce-login = { path = "../agiworkforce-login" }
agiworkforce-model-provider = { path = "../agiworkforce-model-provider" }
agiworkforce-otel = { path = "../agiworkforce-otel" }
agiworkforce-plugin = { path = "../agiworkforce-plugin" }
agiworkforce-protocol = { path = "../agiworkforce-protocol" }
agiworkforce-rmcp-client = { path = "../agiworkforce-rmcp-client" }
agiworkforce-utils-plugins = { path = "../agiworkforce-utils-plugins" }
futures = { version = "0.3", default-features = false }
regex-lite = "0.1.8"
rmcp = { version = "0.15.0", default-features = false, features = ["base64", "macros", "schemars", "server"]}
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha1 = "0.10.6"
thiserror = "2.0.17"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
tokio-util = { version = "0.7.18", features = ["rt"] }
tracing = "0.1.44"
url = "2"

[dev-dependencies]
pretty_assertions = "1.4.1"
rmcp = { version = "0.15.0", default-features = false, features = ["base64", "macros", "schemars", "server"]}
tempfile = "3.23.0"
