[package]
name = "agiworkforce-device-key"
version = "0.1.0"
edition = "2024"


[dependencies]
async-trait = "0.1.89"
base64 = "0.22.1"
p256 = { version = "0.13.2", features = ["ecdsa", "pkcs8"] }
rand = "0.9"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2.0.17"
tokio = { version = "1", features = ["rt"] }
url = "2"

[dev-dependencies]
pretty_assertions = "1.4.1"
