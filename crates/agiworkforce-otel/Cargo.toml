[package]
name = "agiworkforce-otel"
version = "0.1.0"
edition = "2024"

[lib]
doctest = false
name = "agiworkforce_otel"
path = "src/lib.rs"

[features]
## Disables the built-in default metrics exporter.
##
## Intended for use from `dev-dependencies` so unit/integration tests never
## attempt to export metrics over the network.
disable-default-metrics-exporter = []

[dependencies]
chrono = "0.4.43"
agiworkforce-utils-absolute-path = { path = "../agiworkforce-utils-absolute-path" }
agiworkforce-utils-string = { path = "../agiworkforce-utils-string" }
agiworkforce-api = { path = "../agiworkforce-api" }
agiworkforce-app-server-protocol = { path = "../agiworkforce-app-server-protocol" }
agiworkforce-protocol = { path = "../agiworkforce-protocol" }
eventsource-stream = "0.2.3"
gethostname = "1.1.0"
opentelemetry = { version = "0.31.0", features = ["logs", "metrics", "trace"] }
opentelemetry-appender-tracing = "0.31.0"
opentelemetry-otlp = { version = "0.31.0", features = [
    "grpc-tonic",
    "http-proto",
    "http-json",
    "logs",
    "metrics",
    "trace",
    "reqwest-blocking-client",
    "reqwest-rustls",
    "tls",
    "tls-roots",
] }
opentelemetry-semantic-conventions = "0.31.0"
opentelemetry_sdk = { version = "0.31.0", features = [
    "experimental_trace_batch_span_processor_with_async_runtime",
    "experimental_metrics_custom_reader",
    "logs",
    "metrics",
    "rt-tokio",
    "testing",
    "trace",
] }
http = "1.3.1"
os_info = "3.12.0"
reqwest = { version = "0.12", features = ["blocking", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
strum_macros = "0.28.0"
thiserror = "2.0.17"
tokio = "1"
tokio-tungstenite = { version = "0.28.0", features = [
    "rustls-tls-native-roots",
] }
tracing = "0.1.44"
tracing-opentelemetry = "0.32.0"
tracing-subscriber = "0.3.22"

[dev-dependencies]
opentelemetry_sdk = { version = "0.31.0", features = [
    "experimental_metrics_custom_reader",
    "testing",
] }
pretty_assertions = "1.4.1"
