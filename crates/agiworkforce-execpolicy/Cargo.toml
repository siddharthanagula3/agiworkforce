[package]
name = "agiworkforce-execpolicy"
version = "0.1.0"
edition = "2024"
description = "AGI Workforce exec policy: prefix-based Starlark rules for command decisions."

[lib]
name = "agiworkforce_execpolicy"
path = "src/lib.rs"

[[bin]]
name = "agiworkforce-execpolicy"
path = "src/main.rs"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
agiworkforce-utils-absolute-path = { path = "../agiworkforce-utils-absolute-path" }
multimap = "0.10.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
shlex = "1.3.0"
starlark = "0.13.0"
thiserror = "2.0.17"

[dev-dependencies]
pretty_assertions = "1.4.1"
tempfile = "3.23.0"
dirs = "6"
path-absolutize = "3.1.1"
dunce = "1.0.4"
schemars = "0.8.22"
ts-rs = { version = "11", features = ["uuid-impl"] }
regex-lite = "0.1.8"
