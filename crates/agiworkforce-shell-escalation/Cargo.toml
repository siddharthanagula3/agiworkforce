[package]
edition = "2024"

name = "agiworkforce-shell-escalation"
version = "0.1.0"

[[bin]]
name = "agiworkforce-execve-wrapper"
path = "src/bin/main_execve_wrapper.rs"

[dependencies]
anyhow = "1"
async-trait = "0.1.89"
clap = { version = "4", features = ["derive"] }
agiworkforce-protocol = { path = "../agiworkforce-protocol" }
agiworkforce-utils-absolute-path = { path = "../agiworkforce-utils-absolute-path" }
libc = "0.2.182"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
socket2 = { version = "0.6.1", features = ["all"] }
tokio = { version = "1", features = [ "io-std", "net", "macros", "process", "rt-multi-thread", "signal", "time", ] }
tokio-util = "0.7.18"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.22", features = ["env-filter", "fmt"] }

[dev-dependencies]
pretty_assertions = "1.4.1"
tempfile = "3.23.0"
