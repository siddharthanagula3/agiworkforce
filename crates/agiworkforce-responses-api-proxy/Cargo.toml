[package]
name = "agiworkforce-responses-api-proxy"
version = "0.1.0"
edition = "2024"


[lib]
name = "agiworkforce_responses_api_proxy"
path = "src/lib.rs"

[[bin]]
name = "agiworkforce-responses-api-proxy"
path = "src/main.rs"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
agiworkforce-process-hardening = { path = "../agiworkforce-process-hardening" }
ctor = "0.6.3"
libc = "0.2.182"
reqwest = { version = "0.12", features = ["cookies"] , features = ["blocking", "json", "rustls-tls"]}
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tiny_http = "0.12"
zeroize = "1.8.2"

[dev-dependencies]
pretty_assertions = "1.4.1"
