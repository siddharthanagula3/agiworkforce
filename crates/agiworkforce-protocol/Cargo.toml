[package]
edition = "2024"

name = "agiworkforce-protocol"
version = "0.1.0"

[lib]
name = "agiworkforce_protocol"
path = "src/lib.rs"

[dependencies]
chardetng = "0.1.17"
chrono = { version = "0.4.43", features = ["serde"] }
agiworkforce-async-utils = { path = "../agiworkforce-async-utils" }
agiworkforce-execpolicy = { path = "../agiworkforce-execpolicy" }
agiworkforce-network-proxy = { path = "../agiworkforce-network-proxy" }
agiworkforce-utils-absolute-path = { path = "../agiworkforce-utils-absolute-path" }
agiworkforce-utils-image = { path = "../agiworkforce-utils-image" }
agiworkforce-utils-string = { path = "../agiworkforce-utils-string" }
agiworkforce-utils-template = { path = "../agiworkforce-utils-template" }
encoding_rs = "0.8.35"
globset = "0.4"
icu_decimal = "2.1"
icu_locale_core = "2.1"
icu_provider = { version = "2.1", features = ["sync"] }
quick-xml = { version = "0.38.4", features = ["serialize"] }
reqwest = { version = "0.12", features = ["cookies"] }
schemars = "0.8.22"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_with = { version = "3.17", features = ["macros", "base64"] }
strum = "0.27.2"
strum_macros = "0.28.0"
sys-locale = "0.3.2"
thiserror = "2.0.17"
tokio = "1"
tracing = "0.1.44"
ts-rs = { version = "11", features = [ "uuid-impl", "serde-json-impl", "no-serde-warnings", ] }
uuid = { version = "1", features = ["serde", "v7", "v4"] }
wildmatch = "2.6.1"

[target.'cfg(target_os = "linux")'.dependencies]
landlock = "0.4.4"
seccompiler = "0.5.0"

[dev-dependencies]
anyhow = "1"
http = "1.3.1"
pretty_assertions = "1.4.1"
tempfile = "3.23.0"

[package.metadata.cargo-shear]
# Required because:
# `icu_provider`: contains a required `sync` feature for `icu_decimal`
# `strum`: as strum_macros in non-nightly builds
ignored = ["icu_provider", "strum"]
