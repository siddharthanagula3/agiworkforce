[package]
name = "agiworkforce-external-agent-sessions"
version = "0.1.0"
edition = "2024"


[lib]
doctest = false
name = "agiworkforce_external_agent_sessions"
path = "src/lib.rs"

[dependencies]
chrono = "0.4.43"
agiworkforce-protocol = { path = "../agiworkforce-protocol" }
agiworkforce-utils-output-truncation = { path = "../agiworkforce-utils-output-truncation" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"

[dev-dependencies]
agiworkforce-app-server-protocol = { path = "../agiworkforce-app-server-protocol" }
tempfile = "3.23.0"
