[package]
edition = "2024"

name = "agiworkforce-models-manager"
version = "0.1.0"

[lib]
doctest = false
name = "agiworkforce_models_manager"
path = "src/lib.rs"

[dependencies]
async-trait = "0.1.89"
chrono = { version = "0.4.43", features = ["serde"] }
agiworkforce-app-server-protocol = { path = "../agiworkforce-app-server-protocol" }
agiworkforce-collaboration-mode-templates = { path = "../agiworkforce-collaboration-mode-templates" }
agiworkforce-login = { path = "../agiworkforce-login" }
agiworkforce-otel = { path = "../agiworkforce-otel" }
agiworkforce-protocol = { path = "../agiworkforce-protocol" }
agiworkforce-utils-output-truncation = { path = "../agiworkforce-utils-output-truncation" }
agiworkforce-utils-template = { path = "../agiworkforce-utils-template" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["fs", "sync", "time"] }
tracing = { version = "0.1.44", features = ["log"] }

[dev-dependencies]
pretty_assertions = "1.4.1"
serde_json = "1"
tempfile = "3.23.0"
