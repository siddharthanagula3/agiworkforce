[package]
name = "agiworkforce-login"
version = "0.1.0"
edition = "2024"

[dependencies]
async-trait = "0.1.89"
base64 = "0.22.1"
chrono = { version = "0.4.43", features = ["serde"] }
agiworkforce-app-server-protocol = { path = "../agiworkforce-app-server-protocol" }
agiworkforce-client = { path = "../agiworkforce-client" }
agiworkforce-config = { path = "../agiworkforce-config" }
agiworkforce-keyring-store = { path = "../agiworkforce-keyring-store" }
agiworkforce-protocol = { path = "../agiworkforce-protocol" }
agiworkforce-terminal-detection = { path = "../agiworkforce-terminal-detection" }
once_cell = "1.20.2"
os_info = "3.12.0"
rand = "0.9"
reqwest = { version = "0.12", features = ["json", "blocking"] }
schemars = "0.8.22"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
thiserror = "2.0.17"
tiny_http = "0.12"
tokio = { version = "1", features = [
    "io-std",
    "macros",
    "process",
    "rt-multi-thread",
    "signal",
] }
tracing = "0.1.44"
url = "2"
urlencoding = "2.1"
webbrowser = "1.0"

[dev-dependencies]
anyhow = "1"
pretty_assertions = "1.4.1"
regex-lite = "0.1.8"
serial_test = "3.2.0"
tempfile = "3.23.0"
wiremock = "0.6"
