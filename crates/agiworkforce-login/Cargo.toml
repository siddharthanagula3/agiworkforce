[package]
name = "agiworkforce-login"
version = "0.1.0"
edition = "2024"


[dependencies]
async-trait = "0.1.89"
base64 = "0.22.1"
chrono = { version = "0.4.43", features = ["serde"] }
agiworkforce-agent-identity = { path = "../agiworkforce-agent-identity" }
agiworkforce-app-server-protocol = { path = "../agiworkforce-app-server-protocol" }
agiworkforce-client = { path = "../agiworkforce-client" }
agiworkforce-config = { path = "../agiworkforce-config" }
agiworkforce-keyring-store = { path = "../agiworkforce-keyring-store" }
agiworkforce-model-provider-info = { path = "../agiworkforce-model-provider-info" }
agiworkforce-otel = { path = "../agiworkforce-otel" }
agiworkforce-protocol = { path = "../agiworkforce-protocol" }
agiworkforce-terminal-detection = { path = "../agiworkforce-terminal-detection" }
agiworkforce-utils-template = { path = "../agiworkforce-utils-template" }
once_cell = "1.20.2"
os_info = "3.12.0"
rand = "0.9"
reqwest = { version = "0.12", features = ["blocking", "cookies", "json"]}
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
thiserror = "2.0.17"
tiny_http = "0.12"
tokio = { version = "1", features = [ "io-std", "macros", "process", "rt-multi-thread", "signal", ] }
tracing = "0.1.44"
url = "2"
urlencoding = "2.1"
webbrowser = "1.0"

[dev-dependencies]
anyhow = "1"
core_test_support = { path = "../core_test_support" }
jsonwebtoken = "9.3.1"
keyring = { version = "3.6", default-features = false }
pretty_assertions = "1.4.1"
regex-lite = "0.1.8"
serial_test = "3.2.0"
tempfile = "3.23.0"
wiremock = "0.6"
