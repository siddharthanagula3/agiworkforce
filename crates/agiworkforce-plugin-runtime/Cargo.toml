[package]
name = "agiworkforce-plugin-runtime"
version = "0.1.0"
edition = "2021"
authors = ["AGI Automation LLC"]
description = "Plugin manifest schema + discovery for AGI Workforce CLI (5-format matrix: .agiworkforce-plugin / .claude-plugin / .codex-plugin / .app.json / .mcp.json)"
license = "Proprietary"

[lints.rust]
warnings = "warn"
unsafe_code = "deny"
unused = "deny"
unused_imports = "deny"
unused_variables = "deny"
unused_mut = "deny"
dead_code = "deny"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
