[package]
edition = "2024"

name = "agiworkforce-model-provider"
version = "0.1.0"

[lib]
doctest = false
name = "agiworkforce_model_provider"
path = "src/lib.rs"

[dependencies]
async-trait = "0.1.89"
agiworkforce-api = { path = "../agiworkforce-api" }
agiworkforce-agent-identity = { path = "../agiworkforce-agent-identity" }
agiworkforce-aws-auth = { path = "../agiworkforce-aws-auth" }
agiworkforce-client = { path = "../agiworkforce-client" }
agiworkforce-feedback = { path = "../agiworkforce-feedback" }
agiworkforce-login = { path = "../agiworkforce-login" }
agiworkforce-model-provider-info = { path = "../agiworkforce-model-provider-info" }
agiworkforce-models-manager = { path = "../agiworkforce-models-manager" }
agiworkforce-otel = { path = "../agiworkforce-otel" }
agiworkforce-protocol = { path = "../agiworkforce-protocol" }
agiworkforce-response-debug-context = { path = "../agiworkforce-response-debug-context" }
http = "1.3.1"
tokio = { version = "1", features = ["sync", "time"] }
tracing = { version = "0.1.44", features = ["log"] }

[dev-dependencies]
pretty_assertions = "1.4.1"
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt"] }
wiremock = "0.6"
