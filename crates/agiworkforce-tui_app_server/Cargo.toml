[package]
name = "agiworkforce-tui-app-server"
version = "0.1.0"
edition = "2024"

[lib]
name = "agiworkforce_tui_app_server"
path = "src/lib.rs"

[features]
default = ["voice-input"]
vt100-tests = []
debug-logs = []
voice-input = ["dep:cpal", "dep:hound"]

[dependencies]
anyhow = "1"
base64 = "0.22"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4", features = ["derive"] }
color-eyre = "0.6.3"
crossterm = { version = "0.28.1", features = ["bracketed-paste", "event-stream"] }
derive_more = { version = "2", features = ["is_variant"] }
diffy = "0.4"
dirs = "6"
dunce = "1.0.4"
image = { version = "^0.25.9", default-features = false, features = ["jpeg", "png", "webp"] }
itertools = "0.14"
lazy_static = "1"
pathdiff = "0.2"
pulldown-cmark = "0.13.3"
rand = "0.9"
ratatui = { version = "0.29.0", features = [ "scrolling-regions", "unstable-backend-writer", "unstable-rendered-line-info", "unstable-widget-ref", ] }
ratatui-macros = "0.7.0"
regex-lite = "0.1.8"
reqwest = { version = "0.12", features = ["json", "multipart"] }
rmcp = { version = "0.15.0", default-features = false, features = [ "base64", "macros", "schemars", "server", ] }
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["preserve_order"] }
shlex = "1.3.0"
strum = "0.27.2"
strum_macros = "0.28.0"
supports-color = "3.0.2"
syntect = "5"
tempfile = "3.23.0"
textwrap = "0.16"
thiserror = "2.0.17"
tokio = { version = "1.37", features = [ "io-std", "macros", "process", "rt-multi-thread", "signal", "test-util", "time", ] }
tokio-stream = { version = "0.1.18", features = ["sync"] }
tokio-util = { version = "0.7", features = ["time"] }
toml = "0.9.5"
tracing = { version = "0.1.44", features = ["log"] }
tracing-appender = "0.2"
tracing-subscriber = { version = "0.3.22", features = ["env-filter"] }
two-face = { version = "0.5", default-features = false, features = ["syntect-default-onig"] }
unicode-segmentation = "1.11"
unicode-width = "0.2"
url = "2"
uuid = { version = "1", features = ["serde", "v4", "v5"] }
webbrowser = "1.0"
which = "6"

agiworkforce-ansi-escape = { path = "../agiworkforce-ansi-escape" }
agiworkforce-app-server-client = { path = "../agiworkforce-app-server-client" }
agiworkforce-app-server-protocol = { path = "../agiworkforce-app-server-protocol" }
agiworkforce-arg0 = { path = "../agiworkforce-arg0" }
agiworkforce-chatgpt = { path = "../agiworkforce-chatgpt" }
agiworkforce-client = { path = "../agiworkforce-client" }
agiworkforce-cloud-requirements = { path = "../agiworkforce-cloud-requirements" }
agiworkforce-core = { path = "../agiworkforce-core" }
agiworkforce-features = { path = "../agiworkforce-features" }
agiworkforce-feedback = { path = "../agiworkforce-feedback" }
agiworkforce-file-search = { path = "../agiworkforce-file-search" }
agiworkforce-git-utils = { path = "../agiworkforce-git-utils" }
agiworkforce-login = { path = "../agiworkforce-login" }
agiworkforce-otel = { path = "../agiworkforce-otel" }
agiworkforce-protocol = { path = "../agiworkforce-protocol" }
agiworkforce-shell-command = { path = "../agiworkforce-shell-command" }
agiworkforce-state = { path = "../agiworkforce-state" }
agiworkforce-terminal-detection = { path = "../agiworkforce-terminal-detection" }
agiworkforce-utils-absolute-path = { path = "../agiworkforce-utils-absolute-path" }
agiworkforce-utils-approval-presets = { path = "../agiworkforce-utils-approval-presets" }
agiworkforce-utils-cli = { path = "../agiworkforce-utils-cli" }
agiworkforce-utils-elapsed = { path = "../agiworkforce-utils-elapsed" }
agiworkforce-utils-fuzzy-match = { path = "../agiworkforce-utils-fuzzy-match" }
agiworkforce-utils-oss = { path = "../agiworkforce-utils-oss" }
agiworkforce-utils-sandbox-summary = { path = "../agiworkforce-utils-sandbox-summary" }
agiworkforce-utils-sleep-inhibitor = { path = "../agiworkforce-utils-sleep-inhibitor" }
agiworkforce-utils-string = { path = "../agiworkforce-utils-string" }
agiworkforce-windows-sandbox = { path = "../agiworkforce-windows-sandbox-rs" }

[target.'cfg(not(target_os = "linux"))'.dependencies]
cpal = { version = "0.15", optional = true }
hound = { version = "3.5", optional = true }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.52", features = [ "Win32_Foundation", "Win32_System_Console", ] }
winsplit = "0.1"

[target.'cfg(not(target_os = "android"))'.dependencies]
arboard = "3.4"
