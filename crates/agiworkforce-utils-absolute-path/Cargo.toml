[package]
name = "agiworkforce-utils-absolute-path"
version = "0.1.0"
edition = "2024"

[lib]
name = "agiworkforce_utils_absolute_path"
path = "src/lib.rs"

[dependencies]
dirs = "6"
path-absolutize = "3.1.1"
schemars = "0.8.22"
serde = { version = "1", features = ["derive"] }
ts-rs = { version = "11", features = ["serde-json-impl", "no-serde-warnings"] }

[dev-dependencies]
pretty_assertions = "1.4.1"
serde_json = "1"
tempfile = "3.23.0"
