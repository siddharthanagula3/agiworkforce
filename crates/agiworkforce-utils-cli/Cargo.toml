[package]
name = "agiworkforce-utils-cli"
version = "0.1.0"
edition = "2024"

[lib]
name = "agiworkforce_utils_cli"
path = "src/lib.rs"

[dependencies]
agiworkforce-protocol = { path = "../agiworkforce-protocol" }
anyhow = "1"
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
toml = "0.8"

[dev-dependencies]
pretty_assertions = "1"
