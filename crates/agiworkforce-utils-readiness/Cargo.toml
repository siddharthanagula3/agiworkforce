[package]
name = "agiworkforce-utils-readiness"
version = "0.1.0"
edition = "2024"

[lib]
name = "agiworkforce_utils_readiness"
path = "src/lib.rs"

[dependencies]
anyhow = "1"
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
thiserror = "2"
tokio = { version = "1", features = ["sync", "time", "rt", "macros", "rt-multi-thread"] }

[dev-dependencies]
assert_matches = "1"
