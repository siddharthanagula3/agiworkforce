[package]
edition = "2024"

name = "agiworkforce-rollout-trace"
version = "0.1.0"

[lib]
doctest = false
name = "agiworkforce_rollout_trace"
path = "src/lib.rs"

[dependencies]
anyhow = "1"
agiworkforce-code-mode = { path = "../agiworkforce-code-mode" }
agiworkforce-protocol = { path = "../agiworkforce-protocol" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1.44"
uuid = "1"

[dev-dependencies]
pretty_assertions = "1.4.1"
tempfile = "3.23.0"
