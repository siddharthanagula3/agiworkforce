[package]
name = "agiworkforce-lmstudio"
version = "0.1.0"
edition = "2024"

[lib]
name = "agiworkforce_lmstudio"
path = "src/lib.rs"

[dependencies]
agiworkforce-core = { path = "../agiworkforce-core" }
reqwest = { version = "0.12", features = ["json", "stream"] }
serde_json = "1"
tokio = { version = "1", features = ["rt"] }
tracing = { version = "0.1.44", features = ["log"] }
which = "8.0"

[dev-dependencies]
wiremock = "0.6"
tokio = { version = "1", features = ["full"] }
