[package]
name = "agiworkforce-git-utils"
version = "0.1.0"
edition = "2024"

[dependencies]
agiworkforce-utils-absolute-path = { path = "../agiworkforce-utils-absolute-path" }
futures = { version = "0.3", default-features = false, features = ["alloc"] }
once_cell = "1.20.2"
regex = "1"
schemars = "0.8.22"
serde = { version = "1", features = ["derive"] }
tempfile = "3.23.0"
thiserror = "2.0.17"
tokio = { version = "1", features = ["macros", "process", "rt", "time"] }
ts-rs = { version = "11", features = [
    "uuid-impl",
    "serde-json-impl",
    "no-serde-warnings",
] }
walkdir = "2.5.0"

[dev-dependencies]
assert_matches = "1.5.0"
pretty_assertions = "1.4.1"
dirs = "6"
dunce = "1.0.4"
path-absolutize = "3.1.1"
schemars = "0.8.22"
ts-rs = { version = "11", features = ["uuid-impl", "serde-json-impl", "no-serde-warnings"] }
once_cell = "1.20.2"
regex-lite = "0.1.8"
ignore = "0.4.23"
