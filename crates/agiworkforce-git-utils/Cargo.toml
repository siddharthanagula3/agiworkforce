[package]
name = "agiworkforce-git-utils"
version = "0.1.0"
edition = "2024"

readme = "README.md"

[dependencies]
anyhow = "1"
chrono = "0.4.43"
agiworkforce-file-system = { path = "../agiworkforce-file-system" }
agiworkforce-protocol = { path = "../agiworkforce-protocol" }
agiworkforce-utils-absolute-path = { path = "../agiworkforce-utils-absolute-path" }
futures = { version = "0.3", default-features = false , features = ["alloc"]}
gix = { version = "0.81.0", default-features = false, features = ["sha1"] }
once_cell = "1.20.2"
regex = "1"
schemars = "0.8.22"
serde = { version = "1", features = ["derive"] }
similar = "2.7.0"
tempfile = "3.23.0"
thiserror = "2.0.17"
tokio = { version = "1", features = ["macros", "process", "rt", "time"] }
ts-rs = { version = "11", features = [ "uuid-impl", "serde-json-impl", "no-serde-warnings", ] }
walkdir = "2.5.0"

[dev-dependencies]
pretty_assertions = "1.4.1"
