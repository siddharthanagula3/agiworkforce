[package]
name = "agiworkforce-package-manager"
version = "0.1.0"
edition = "2024"

[dependencies]
fd-lock = "4.0.4"
flate2 = "1.1.4"
reqwest = { version = "0.12", features = ["json", "stream"] }
serde = { version = "1", features = ["derive"] }
sha2 = "0.10"
tar = "0.4.45"
tempfile = "3.23.0"
thiserror = "2.0.17"
tokio = { version = "1", features = ["fs", "rt", "sync", "time"] }
url = "2"
zip = "2.4.2"

[dev-dependencies]
pretty_assertions = "1.4.1"
serde_json = "1"
tokio = { version = "1", features = ["fs", "macros", "rt", "rt-multi-thread"] }
wiremock = "0.6"
