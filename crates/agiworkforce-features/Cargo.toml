[package]
name = "agiworkforce-features"
version = "0.1.0"
edition = "2024"

[lib]
doctest = false
name = "agiworkforce_features"
path = "src/lib.rs"

[dependencies]
agiworkforce-login = { path = "../agiworkforce-login" }
agiworkforce-otel = { path = "../agiworkforce-otel" }
agiworkforce-protocol = { path = "../agiworkforce-protocol" }
schemars = "0.8.22"
serde = { version = "1", features = ["derive"] }
toml = "0.9.5"
tracing = { version = "0.1.44", features = ["log"] }

[dev-dependencies]
pretty_assertions = "1.4.1"
