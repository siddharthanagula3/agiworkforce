
[package]
edition = "2024"

name = "agiworkforce-utils-plugins"
version = "0.1.0"

[lib]
doctest = false
name = "agiworkforce_utils_plugins"
path = "src/lib.rs"

[dependencies]
agiworkforce-exec-server = { path = "../agiworkforce-exec-server" }
agiworkforce-login = { path = "../agiworkforce-login" }
agiworkforce-utils-absolute-path = { path = "../agiworkforce-utils-absolute-path" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
tempfile = "3.23.0"
tokio = { version = "1", features = ["macros", "rt"] }
