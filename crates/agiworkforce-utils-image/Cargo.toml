[package]
name = "agiworkforce-utils-image"
version = "0.1.0"
edition = "2024"

[lib]
name = "agiworkforce_utils_image"
path = "src/lib.rs"

[dependencies]
agiworkforce-utils-cache = { path = "../agiworkforce-utils-cache" }
mime_guess = "2.0.5"
anyhow = "1"
base64 = "0.22.1"
image = { version = "^0.25.9", default-features = false, features = ["jpeg", "png", "webp", "gif"] }
schemars = "0.8.22"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2.0.17"
ts-rs = { version = "11", features = ["serde-json-impl", "no-serde-warnings"] }
