[package]
name = "agiworkforce-hooks"
version = "0.1.0"
edition = "2024"

[lib]
doctest = false
name = "agiworkforce_hooks"
path = "src/lib.rs"

[dependencies]
anyhow = "1"
chrono = { version = "0.4.43", features = ["serde"] }
agiworkforce-config = { path = "../agiworkforce-config" }
agiworkforce-plugin = { path = "../agiworkforce-plugin" }
agiworkforce-protocol = { path = "../agiworkforce-protocol" }
agiworkforce-utils-absolute-path = { path = "../agiworkforce-utils-absolute-path" }
futures = { version = "0.3", default-features = false, features = ["alloc"] }
regex = "1.12.3"
schemars = "0.8.22"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["io-util", "process", "time"] }

[dev-dependencies]
pretty_assertions = "1.4.1"
tempfile = "3.23.0"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "time"] }
