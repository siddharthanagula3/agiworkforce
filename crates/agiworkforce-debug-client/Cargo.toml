[package]
name = "agiworkforce-debug-client"
version = "0.1.0"
edition = "2024"

[lib]
name = "agiworkforce_debug_client"
path = "src/lib.rs"

[dependencies]
agiworkforce-app-server-protocol = { path = "../agiworkforce-app-server-protocol" }
anyhow = "1"
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }

[dev-dependencies]
pretty_assertions = "1.4.1"
