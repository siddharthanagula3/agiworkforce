[package]
name = "agiworkforce-network-proxy"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[lib]
name = "agiworkforce_network_proxy"
path = "src/lib.rs"

[dependencies]
anyhow = "1"
async-trait = "0.1.89"
clap = { version = "4", features = ["derive"] }
chrono = "0.4.43"
agiworkforce-utils-absolute-path = { path = "../agiworkforce-utils-absolute-path" }
agiworkforce-utils-home-dir = { path = "../agiworkforce-utils-home-dir" }
agiworkforce-utils-rustls-provider = { path = "../agiworkforce-utils-rustls-provider" }
globset = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2.0.17"
time = "0.3.47"
tokio = { version = "1", features = ["full"] }
tracing = "0.1.44"
url = "2"
rama-core = { version = "=0.3.0-alpha.4" }
rama-http = { version = "=0.3.0-alpha.4" }
rama-http-backend = { version = "=0.3.0-alpha.4", features = ["tls"] }
rama-net = { version = "=0.3.0-alpha.4", features = ["http", "tls"] }
rama-socks5 = { version = "=0.3.0-alpha.4" }
rama-tcp = { version = "=0.3.0-alpha.4", features = ["http"] }
rama-tls-rustls = { version = "=0.3.0-alpha.4", features = ["http"] }

[dev-dependencies]
pretty_assertions = "1.4.1"
tempfile = "3.23.0"

[target.'cfg(target_family = "unix")'.dependencies]
rama-unix = { version = "=0.3.0-alpha.4" }
