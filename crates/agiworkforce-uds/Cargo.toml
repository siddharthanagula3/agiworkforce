[package]
name = "agiworkforce-uds"
version = "0.1.0"
edition = "2024"


[lib]
name = "agiworkforce_uds"
path = "src/lib.rs"

[dependencies]
tokio = { version = "1", features = ["fs", "net", "rt"] }

[target.'cfg(windows)'.dependencies]
async-io = "2.6.0"
tokio-util = { version = "0.7.18", features = ["compat"] }
uds_windows = "1.1.0"

[dev-dependencies]
pretty_assertions = "1.4.1"
tempfile = "3.23.0"
tokio = { workspace = true, features = [
    "io-util",
    "macros",
    "rt-multi-thread",
] }
