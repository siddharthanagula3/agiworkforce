[package]
name = "agiworkforce-secrets"
version = "0.1.0"
edition = "2024"

[dependencies]
age = "0.11.1"
anyhow = "1"
base64 = "0.22.1"
agiworkforce-git-utils = { path = "../agiworkforce-git-utils" }
agiworkforce-keyring-store = { path = "../agiworkforce-keyring-store" }
rand = "0.9"
regex = "1.12.3"
schemars = "0.8.22"
serde = "1"
serde_json = "1"
sha2 = "0.10"
tracing = "0.1.44"

[dev-dependencies]
keyring = { version = "3.6", default-features = false }
pretty_assertions = "1.4.1"
tempfile = "3.23.0"
dirs = "6"
path-absolutize = "3.1.1"
schemars = "0.8.22"
ts-rs = { version = "11", features = ["uuid-impl"] }
