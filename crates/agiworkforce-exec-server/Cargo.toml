[package]
name = "agiworkforce-exec-server"
version = "0.1.0"
edition = "2024"

[lib]
doctest = false

[[bin]]
name = "agiworkforce-exec-server"
path = "src/bin/agiworkforce-exec-server.rs"

[dependencies]
async-trait = "0.1.89"
base64 = "0.22.1"
clap = { version = "4", features = ["derive"] }
agiworkforce-app-server-protocol = { path = "../agiworkforce-app-server-protocol" }
agiworkforce-utils-absolute-path = { path = "../agiworkforce-utils-absolute-path" }
agiworkforce-utils-pty = { path = "../agiworkforce-utils-pty" }
futures = { version = "0.3", default-features = false }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2.0.17"
tokio = { version = "1", features = [
    "fs",
    "io-std",
    "io-util",
    "macros",
    "net",
    "process",
    "rt-multi-thread",
    "sync",
    "time",
] }
tokio-tungstenite = { version = "0.28.0", features = [
    "proxy",
    "rustls-tls-native-roots",
] }
tracing = "0.1.44"

[dev-dependencies]
anyhow = "1"
pretty_assertions = "1.4.1"
tempfile = "3.23.0"
test-case = "3.3.1"
