[package]
name = "agiworkforce-exec-server"
version = "0.1.0"
edition = "2024"


[lib]
doctest = false

[dependencies]
arc-swap = "1.9.0"
async-trait = "0.1.89"
base64 = "0.22.1"
bytes = "1.10.1"
agiworkforce-app-server-protocol = { path = "../agiworkforce-app-server-protocol" }
agiworkforce-client = { path = "../agiworkforce-client" }
agiworkforce-file-system = { path = "../agiworkforce-file-system" }
agiworkforce-protocol = { path = "../agiworkforce-protocol" }
agiworkforce-sandboxing = { path = "../agiworkforce-sandboxing" }
agiworkforce-utils-absolute-path = { path = "../agiworkforce-utils-absolute-path" }
agiworkforce-utils-pty = { path = "../agiworkforce-utils-pty" }
futures = { version = "0.3", default-features = false }
reqwest = { version = "0.12", features = ["cookies", "rustls-tls", "stream"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2.0.17"
tokio = { version = "1", features = ["fs", "io-std", "io-util", "macros", "net", "process", "rt-multi-thread", "sync", "time"] }
tokio-util = { version = "0.7.18", features = ["rt"] }
tokio-tungstenite = { version = "0.28.0", features = ["proxy", "rustls-tls-native-roots"] }
tracing = "0.1.44"
uuid = { version = "1", features = ["v4"] }

[dev-dependencies]
anyhow = "1"
agiworkforce-test-binary-support = { path = "../agiworkforce-test-binary-support" }
ctor = "0.6.3"
pretty_assertions = "1.4.1"
serial_test = "3.2.0"
tempfile = "3.23.0"
test-case = "3.3.1"
