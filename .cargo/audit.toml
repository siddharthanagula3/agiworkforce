# Security audit configuration for cargo-audit
# All vulnerabilities have been fixed. The following are warnings for unmaintained/unsound
# crates that are transitive dependencies from upstream projects (Tauri, async-imap, etc.)
# and cannot be resolved by updating our direct dependencies.

[advisories]
# Warnings are informational - we want to see new ones but ignore known ones
ignore = [
    # GTK3 bindings (Linux support) - unmaintained but still widely used
    # Transitive dependency from Tauri for Linux GUI support
    # No security vulnerability, just maintenance status
    "RUSTSEC-2024-0413", # atk - GTK3 bindings unmaintained (Tauri Linux dependency)
    "RUSTSEC-2024-0416", # atk-sys - GTK3 bindings unmaintained (Tauri Linux dependency)
    "RUSTSEC-2024-0412", # gdk - GTK3 bindings unmaintained (Tauri Linux dependency)
    "RUSTSEC-2024-0418", # gdk-sys - GTK3 bindings unmaintained (Tauri Linux dependency)
    "RUSTSEC-2024-0411", # gdkwayland-sys - GTK3 bindings unmaintained (Tauri Linux dependency)
    "RUSTSEC-2024-0417", # gdkx11 - GTK3 bindings unmaintained (Tauri Linux dependency)
    "RUSTSEC-2024-0414", # gdkx11-sys - GTK3 bindings unmaintained (Tauri Linux dependency)
    "RUSTSEC-2024-0415", # gtk - GTK3 bindings unmaintained (Tauri Linux dependency)
    "RUSTSEC-2024-0420", # gtk-sys - GTK3 bindings unmaintained (Tauri Linux dependency)
    "RUSTSEC-2024-0419", # gtk3-macros - GTK3 bindings unmaintained (Tauri Linux dependency)
    "RUSTSEC-2024-0429", # glib - unsound VariantStrIter (Tauri Linux dependency, not used in our code paths)

    # async-std - discontinued but stable, transitive from async-imap
    # No replacement available for async-imap that uses tokio
    "RUSTSEC-2025-0052", # async-std - discontinued (async-imap dependency)

    # Other unmaintained crates - transitive dependencies with no security issues
    "RUSTSEC-2025-0141", # bincode - unmaintained (transitive, no security issue)
    "RUSTSEC-2025-0057", # fxhash - unmaintained (transitive, no security issue)
    "RUSTSEC-2024-0384", # instant - unmaintained (transitive, no security issue)
    "RUSTSEC-2024-0436", # paste - unmaintained (transitive, no security issue)
    "RUSTSEC-2024-0370", # proc-macro-error - unmaintained (transitive, no security issue)
    "RUSTSEC-2025-0134", # rustls-pemfile - unmaintained (transitive, no security issue)
    "RUSTSEC-2017-0008", # serial - unmaintained (transitive, no security issue)

    # UNIC crates - unmaintained but stable Unicode utilities
    "RUSTSEC-2025-0081", # unic-char-property - unmaintained (transitive, no security issue)
    "RUSTSEC-2025-0075", # unic-char-range - unmaintained (transitive, no security issue)
    "RUSTSEC-2025-0080", # unic-common - unmaintained (transitive, no security issue)
    "RUSTSEC-2025-0100", # unic-ucd-ident - unmaintained (transitive, no security issue)
    "RUSTSEC-2025-0098", # unic-ucd-version - unmaintained (transitive, no security issue)

    # lru - unsound IterMut (mysql_async dependency)
    # The unsoundness only affects IterMut which we don't use directly
    "RUSTSEC-2026-0002", # lru - unsound IterMut (mysql_async dependency, not used in our code)

    # rustls-webpki v0.101.7 - CRL distribution point matching bug
    # Transitive from Tauri's older rustls dependency chain, pinned to 0.101.x
    # v0.103.x updated to 0.103.10 (patched), but 0.101.x has no patch available
    # Low impact: requires compromised CA to exploit
    "RUSTSEC-2026-0049", # rustls-webpki CRL matching (Tauri transitive, low impact)
]

[yanked]
# Enable yanked crate detection
enabled = true
