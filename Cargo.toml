[workspace]
members = [
  "apps/desktop/src-tauri"
]
resolver = "2"

[profile.release]
codegen-units = 1
lto = true
opt-level = "z"
strip = true
panic = "abort"




[profile.dev]
debug = 0            
incremental = false  
opt-level = 0        
strip = "symbols"    
split-debuginfo = "off"  


[profile.dev.package."*"]
debug = 0
opt-level = 0
strip = "symbols"
