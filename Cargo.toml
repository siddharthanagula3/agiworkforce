resolver = "2"

[profile.release]
codegen-units = 1
lto = true
opt-level = "z"
strip = true
panic = "abort"




[profile.dev]
debug = true           # enable debug info for readable backtraces
opt-level = 0
split-debuginfo = "off"


[profile.dev.package."*"]
debug = 0
opt-level = 0

