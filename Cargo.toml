[workspace]
members = [
  "apps/desktop/src-tauri",
  "apps/cli",
  "crates/*",
]
# Sprint 0 (FIX-006a) workspace exclusions:
# - `agiworkforce-tui` and `agiworkforce-tui_app_server` are mid-port from
#   codex-rs and have 396 unresolved-symbol errors between them. Sprint 5's
#   FIX-021 plans to delete `tui_app_server` outright and finish the port for
#   `tui`; until then, running them through CI just keeps `main` red. The
#   binaries that ship today (`apps/desktop`, `apps/cli`) do **not** depend on
#   either crate.
# - `agiworkforce-cloud-tasks` depends on `agiworkforce-tui` so it has to ride
#   along until the TUI port is finished.
# - `crates/agiworkforce-utils` is a pre-existing exclusion (legacy stub).
exclude = [
  # Pre-existing exclusions (kept)
  "crates/agiworkforce-utils",
  "crates/agiworkforce-tui",
  "crates/agiworkforce-tui_app_server",
  "crates/agiworkforce-cloud-tasks",
  # FIX-022 (Sprint 5): 98 codex-rs port crates that no shipping
  # binary (apps/desktop or apps/cli) reaches via cargo tree. Their
  # source stays in crates/ for future re-inclusion if a feature
  # is wired up, but excluding them from the workspace shrinks
  # cargo build / audit / lock-resolution surface dramatically.
  "crates/agiworkforce-agent-graph-store",
  "crates/agiworkforce-agent-identity",
  "crates/agiworkforce-analytics",
  "crates/agiworkforce-ansi-escape",
  "crates/agiworkforce-api",
  "crates/agiworkforce-app-server",
  "crates/agiworkforce-app-server-client",
