<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AGI Workforce Queue</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0f0f0f;
        color: #e5e7eb;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .header {
        padding: 16px;
        border-bottom: 1px solid #1f2937;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .logo {
        width: 28px;
        height: 28px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
      }
      .title {
        font-size: 14px;
        font-weight: 600;
        color: #f9fafb;
      }
      .subtitle {
        font-size: 11px;
        color: #6b7280;
      }
      .queue-list {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .queue-item {
        background: #1f2937;
        border-radius: 8px;
        padding: 12px;
        border: 1px solid #374151;
      }
      .queue-item .text {
        font-size: 13px;
        color: #d1d5db;
        line-height: 1.4;
      }
      .queue-item .meta {
        font-size: 11px;
        color: #6b7280;
        margin-top: 6px;
      }
      .queue-item.processing {
        border-color: #6366f1;
        background: #1e1b4b;
      }
      .queue-item.done {
        border-color: #10b981;
        background: #064e3b22;
      }
      .queue-item.error {
        border-color: #ef4444;
        background: #450a0a22;
      }
      .input-area {
        padding: 12px;
        border-top: 1px solid #1f2937;
      }
      .input-row {
        display: flex;
        gap: 8px;
      }
      .input-row textarea {
        flex: 1;
        background: #1f2937;
        border: 1px solid #374151;
        border-radius: 8px;
        color: #f9fafb;
        font-size: 13px;
        padding: 10px;
        resize: none;
        height: 72px;
        outline: none;
        font-family: inherit;
      }
      .input-row textarea:focus {
        border-color: #6366f1;
      }
      .send-btn {
        background: #6366f1;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 0 16px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        white-space: nowrap;
      }
      .send-btn:hover {
        background: #4f46e5;
      }
      .send-btn:disabled {
        background: #374151;
        cursor: not-allowed;
      }
      .empty {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #4b5563;
        font-size: 13px;
        text-align: center;
        padding: 24px;
      }
      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        display: inline-block;
        margin-right: 6px;
      }
      .dot-processing {
        background: #6366f1;
        animation: pulse 1.5s infinite;
      }
      .dot-done {
        background: #10b981;
      }
      .dot-error {
        background: #ef4444;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="logo">&#9889;</div>
      <div>
        <div class="title">AGI Workforce</div>
        <div class="subtitle">Message Queue</div>
      </div>
    </div>
    <div class="queue-list" id="queueList">
      <div class="empty" id="emptyState">
        No messages in queue.<br />Type below to queue a task.
      </div>
    </div>
    <div class="input-area">
      <div class="input-row">
        <textarea id="msgInput" placeholder="Ask anything about this page..."></textarea>
        <button class="send-btn" id="sendBtn">Send</button>
      </div>
    </div>
    <script type="module" src="./side_panel.js"></script>
  </body>
</html>
