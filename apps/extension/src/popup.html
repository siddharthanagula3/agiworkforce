<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AGI</title>
    <style>
      :root {
        --agi-ext-accent: #21808d;
        --agi-ext-accent-secondary: #da7756;
        --agi-ext-on-accent: #ffffff;
        --agi-ext-success: #16a34a;
        --agi-ext-danger: #dc2626;
        --agi-ext-warning: #d97706;
        --agi-ext-bg: #faf9f7;
        --agi-ext-surface: #ffffff;
        --agi-ext-hover: #f0eeeb;
        --agi-ext-text: #1a1915;
        --agi-ext-text-muted: #6b6560;
        --agi-ext-border: rgba(26, 25, 21, 0.08);
        --agi-ext-border-strong: rgba(26, 25, 21, 0.15);
        --agi-ext-success-bg: rgba(22, 163, 74, 0.08);
        --agi-ext-success-border: rgba(22, 163, 74, 0.24);
        --agi-ext-danger-bg: rgba(220, 38, 38, 0.08);
        --agi-ext-danger-border: rgba(220, 38, 38, 0.24);
        --agi-ext-danger-shadow: rgba(220, 38, 38, 0.3);
        --agi-ext-transparent-shadow: rgba(220, 38, 38, 0);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 380px;
        min-height: 480px;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        background: linear-gradient(
          135deg,
          var(--agi-ext-accent) 0%,
          var(--agi-ext-accent-secondary) 100%
        );
        color: white;
        overflow-x: hidden;
      }

      .header {
        padding: 24px 20px 20px;
        text-align: center;
      }

      .header h1 {
        font-size: 22px;
        margin-bottom: 6px;
        font-weight: 700;
        letter-spacing: -0.5px;
      }

      .header p {
        font-size: 12px;
        opacity: 0.9;
        font-weight: 400;
      }

      .content {
        background: var(--agi-ext-surface);
        color: var(--agi-ext-text);
        padding: 24px;
        border-radius: 16px 16px 0 0;
        box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.1);
      }

      .status-card {
        display: flex;
        align-items: center;
        padding: 16px;
        background: var(--agi-ext-bg);
        border-radius: 12px;
        margin-bottom: 20px;
        border: 1px solid var(--agi-ext-border-strong);
        transition: all 0.3s ease;
      }

      .status-card.connected {
        background: var(--agi-ext-success-bg);
        border-color: var(--agi-ext-success-border);
      }

      .status-icon {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-right: 14px;
        flex-shrink: 0;
        background: var(--agi-ext-surface);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      .status-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--agi-ext-danger);
        animation: pulse 2s infinite;
      }

      .status-card.connected .status-dot {
        background: var(--agi-ext-success);
      }

      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 var(--agi-ext-danger-shadow);
        }
        70% {
          box-shadow: 0 0 0 6px var(--agi-ext-transparent-shadow);
        }
        100% {
          box-shadow: 0 0 0 0 var(--agi-ext-transparent-shadow);
        }
      }

      .status-card.connected .status-dot {
        animation: pulse-green 2s infinite;
      }

      @keyframes pulse-green {
        0% {
          box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.7);
        }
        70% {
          box-shadow: 0 0 0 6px rgba(22, 163, 74, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(22, 163, 74, 0);
        }
      }

      .status-info {
        flex: 1;
      }

      .status-title {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 4px;
        color: var(--agi-ext-text);
      }

      .status-card.connected .status-title {
        color: var(--agi-ext-success);
      }

      .status-subtitle {
        font-size: 12px;
        color: var(--agi-ext-text-muted);
      }

      .status-card.connected .status-subtitle {
        color: var(--agi-ext-success);
      }

      .status-card.reconnecting {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.24);
      }

      .status-card.reconnecting .status-dot {
        background: var(--agi-ext-warning);
        animation: pulse-yellow 2s infinite;
      }

      @keyframes pulse-yellow {
        0% {
          box-shadow: 0 0 0 0 rgba(217, 119, 6, 0.7);
        }
        70% {
          box-shadow: 0 0 0 6px rgba(217, 119, 6, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(217, 119, 6, 0);
        }
      }

      .status-card.reconnecting .status-title {
        color: var(--agi-ext-warning);
      }

      .status-card.reconnecting .status-subtitle {
        color: var(--agi-ext-warning);
      }

      .reconnect-btn {
        display: none;
        margin-top: 8px;
        padding: 6px 12px;
        background: transparent;
        border: 1px solid var(--agi-ext-border-strong);
        border-radius: 6px;
        font-size: 12px;
        font-weight: 600;
        color: var(--agi-ext-text);
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .reconnect-btn:hover {
        background: var(--agi-ext-hover);
        border-color: var(--agi-ext-text-muted);
      }

      .reconnect-btn.visible {
        display: inline-block;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 20px;
      }

      .action-btn {
        padding: 12px 16px;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        background: var(--agi-ext-bg);
        color: var(--agi-ext-text);
        border: 1px solid var(--agi-ext-border-strong);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }

      .action-btn:hover {
        background: var(--agi-ext-hover);
        transform: translateY(-1px);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .action-btn:active {
        transform: translateY(0);
      }

      .action-btn.primary {
        background: linear-gradient(
          135deg,
          var(--agi-ext-accent) 0%,
          var(--agi-ext-accent-secondary) 100%
        );
        color: var(--agi-ext-on-accent);
        border: none;
      }

      .action-btn.primary:hover {
        box-shadow: 0 4px 12px rgba(33, 128, 141, 0.3);
      }

      .info-section {
        margin-top: 20px;
      }

      .section-title {
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--agi-ext-text-muted);
        margin-bottom: 12px;
      }

      .info-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 12px;
        border-radius: 6px;
        font-size: 13px;
        margin-bottom: 4px;
        transition: background 0.2s ease;
      }

      .info-item:hover {
        background: var(--agi-ext-hover);
      }

      .info-label {
        font-weight: 600;
        color: var(--agi-ext-text);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .info-value {
        color: var(--agi-ext-text-muted);
        font-size: 12px;
        font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', monospace;
        background: var(--agi-ext-bg);
        padding: 4px 8px;
        border-radius: 4px;
        max-width: 200px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-top: 16px;
      }

      .stat-card {
        text-align: center;
        padding: 12px;
        background: var(--agi-ext-bg);
        border-radius: 8px;
        border: 1px solid var(--agi-ext-border-strong);
      }

      .stat-value {
        font-size: 20px;
        font-weight: 700;
        color: var(--agi-ext-accent);
        margin-bottom: 4px;
      }

      .stat-label {
        font-size: 11px;
        color: var(--agi-ext-text-muted);
        font-weight: 500;
      }

      .footer {
        padding: 16px 20px 20px;
        text-align: center;
        font-size: 11px;
        opacity: 0.9;
      }

      .footer a {
        color: white;
        text-decoration: none;
        font-weight: 600;
        transition: opacity 0.2s ease;
      }

      .footer a:hover {
        opacity: 0.8;
      }

      /* Tier badge */
      .tier-badge {
        background: linear-gradient(
          135deg,
          var(--agi-ext-accent) 0%,
          var(--agi-ext-accent-secondary) 100%
        );
        color: var(--agi-ext-on-accent);
        font-weight: 700;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        border-radius: 4px;
        padding: 3px 8px;
        font-size: 11px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }

      /* Paywall card */
      #paywallCard {
        background: rgba(217, 119, 6, 0.08);
        border: 1px solid rgba(217, 119, 6, 0.24);
        border-radius: 10px;
        padding: 14px 16px;
        margin-bottom: 16px;
      }

      .paywall-title {
        font-size: 13px;
        font-weight: 700;
        color: var(--agi-ext-warning);
        margin-bottom: 6px;
        line-height: 1.4;
      }

      .paywall-reason {
        font-size: 12px;
        color: var(--agi-ext-text-muted);
        margin-bottom: 10px;
        line-height: 1.4;
      }

      .paywall-btn-row {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      .paywall-upgrade-btn {
        display: inline-block;
        padding: 6px 14px;
        background: linear-gradient(
          135deg,
          var(--agi-ext-accent) 0%,
          var(--agi-ext-accent-secondary) 100%
        );
        color: var(--agi-ext-on-accent);
        font-size: 12px;
        font-weight: 700;
        text-decoration: none;
        border-radius: 6px;
        transition: box-shadow 0.2s ease;
      }

      .paywall-upgrade-btn:hover {
        box-shadow: 0 3px 10px rgba(33, 128, 141, 0.35);
      }

      .paywall-dismiss-btn {
        padding: 6px 12px;
        background: transparent;
        border: 1px solid var(--agi-ext-border-strong);
        border-radius: 6px;
        font-size: 12px;
        font-weight: 600;
        color: var(--agi-ext-text);
        cursor: pointer;
        transition: background 0.2s ease;
      }

      .paywall-dismiss-btn:hover {
        background: var(--agi-ext-hover);
      }

      /* Pairing section */
      .pairing-section {
        margin-top: 0;
      }

      .pairing-status-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 12px;
        border-radius: 6px;
        font-size: 13px;
      }

      .pairing-status-label {
        font-weight: 600;
        color: var(--agi-ext-text);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .pairing-fingerprint {
        font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', monospace;
        font-size: 11px;
        background: var(--agi-ext-bg);
        border: 1px solid var(--agi-ext-border-strong);
        color: var(--agi-ext-text);
        padding: 3px 7px;
        border-radius: 4px;
        letter-spacing: 1px;
      }

      .pairing-fingerprint.paired {
        background: var(--agi-ext-success-bg);
        border-color: var(--agi-ext-success-border);
        color: var(--agi-ext-success);
      }

      .pairing-error {
        font-size: 11px;
        color: var(--agi-ext-danger);
        background: var(--agi-ext-danger-bg);
        border: 1px solid var(--agi-ext-danger-border);
        border-radius: 4px;
        padding: 6px 10px;
        margin: 0 12px 8px;
        display: none;
        word-break: break-word;
      }

      .pairing-error.visible {
        display: block;
      }

      .pairing-btn-row {
        display: flex;
        gap: 8px;
        padding: 4px 12px 8px;
      }

      .pairing-btn {
        flex: 1;
        padding: 8px 12px;
        border: 1px solid var(--agi-ext-border-strong);
        border-radius: 6px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        background: var(--agi-ext-bg);
        color: var(--agi-ext-text);
      }

      .pairing-btn:hover:not(:disabled) {
        background: var(--agi-ext-hover);
        border-color: var(--agi-ext-text-muted);
      }

      .pairing-btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .pairing-btn.primary {
        background: linear-gradient(
          135deg,
          var(--agi-ext-accent) 0%,
          var(--agi-ext-accent-secondary) 100%
        );
        color: var(--agi-ext-on-accent);
        border: none;
      }

      .pairing-btn.primary:hover:not(:disabled) {
        box-shadow: 0 2px 8px rgba(33, 128, 141, 0.3);
        background: linear-gradient(
          135deg,
          var(--agi-ext-accent) 0%,
          var(--agi-ext-accent-secondary) 100%
        );
      }

      .pairing-btn.danger {
        color: var(--agi-ext-danger);
        border-color: var(--agi-ext-danger-border);
        background: var(--agi-ext-danger-bg);
      }

      .pairing-btn.danger:hover:not(:disabled) {
        background: rgba(220, 38, 38, 0.15);
      }

      /* Toggle switch */
      .toggle-switch {
        position: relative;
        display: inline-block;
        width: 38px;
        height: 22px;
        flex-shrink: 0;
        cursor: pointer;
      }

      .toggle-switch input {
        opacity: 0;
        width: 0;
        height: 0;
        position: absolute;
      }

      .toggle-slider {
        position: absolute;
        inset: 0;
        background: var(--agi-ext-border-strong);
        border-radius: 22px;
        transition: background 0.2s ease;
      }

      .toggle-slider::before {
        content: '';
        position: absolute;
        width: 16px;
        height: 16px;
        left: 3px;
        top: 3px;
        background: white;
        border-radius: 50%;
        transition: transform 0.2s ease;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
      }

      .toggle-switch input:checked + .toggle-slider {
        background: linear-gradient(
          135deg,
          var(--agi-ext-accent) 0%,
          var(--agi-ext-accent-secondary) 100%
        );
      }

      .toggle-switch input:checked + .toggle-slider::before {
        transform: translateX(16px);
      }

      .divider {
        height: 1px;
        background: var(--agi-ext-border-strong);
        margin: 20px 0;
      }

      .loading {
        display: inline-block;
        width: 12px;
        height: 12px;
        border: 2px solid var(--agi-ext-border-strong);
        border-top-color: var(--agi-ext-text-muted);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>AGI</h1>
      <p>Browser Automation Extension</p>
    </div>

    <div class="content">
      <!-- Connection Status -->
      <div class="status-card" id="statusCard">
        <div class="status-icon">
          <div class="status-dot" id="statusDot"></div>
        </div>
        <div class="status-info">
          <div class="status-title" id="statusTitle">Checking connection...</div>
          <div class="status-subtitle" id="statusSubtitle">Connecting to desktop app</div>
          <button class="reconnect-btn" id="reconnectBtn">Reconnect</button>
        </div>
      </div>

      <!-- Quick Actions -->
      <div class="actions">
        <button class="action-btn primary" id="sidePanelBtn">💬 Open Chat</button>
        <button class="action-btn primary" id="captureBtn">📸 Capture</button>
        <button class="action-btn" id="refreshBtn">🔄 Refresh</button>
        <button class="action-btn" id="groupBtn">📂 Group Tab</button>
      </div>

      <!-- Statistics -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="tabCount">-</div>
          <div class="stat-label">Tabs</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="actionCount">-</div>
          <div class="stat-label">Actions</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="sessionTime">-</div>
          <div class="stat-label">Session</div>
        </div>
      </div>

      <div class="divider"></div>

      <!-- In-page panel toggle -->
      <div class="info-section">
        <div class="section-title">In-Page Panel</div>
        <div class="info-item">
          <span class="info-label">Page chat overlay</span>
          <label class="toggle-switch" aria-label="Toggle in-page panel">
            <input type="checkbox" id="inPagePanelToggle" checked />
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Desktop Pairing -->
      <div class="info-section pairing-section">
        <div class="section-title">Desktop Pairing</div>
        <div class="pairing-status-row">
          <span class="pairing-status-label" id="pairingStatusLabel">Not paired</span>
          <span class="pairing-fingerprint" id="pairingFingerprint" hidden></span>
        </div>
        <p class="pairing-error" id="pairingError"></p>
        <div class="pairing-btn-row">
          <button class="pairing-btn primary" id="pairBtn">Pair with Desktop</button>
          <button class="pairing-btn danger" id="unpairBtn" hidden>Unpair</button>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Page Information -->
      <div class="info-section">
        <div class="section-title">Current Page</div>
        <div class="info-item">
          <span class="info-label">Tab ID</span>
          <span class="info-value" id="tabId">-</span>
        </div>
        <div class="info-item">
          <span class="info-label">URL</span>
          <span class="info-value" id="currentUrl" title="">-</span>
        </div>
        <div class="info-item">
          <span class="info-label">Version</span>
          <span class="info-value" id="extVersion">v…</span>
        </div>
        <div class="info-item" id="tierRow">
          <span class="info-label">Plan</span>
          <span class="info-value tier-badge" id="userTier" hidden></span>
        </div>
      </div>
    </div>

    <div class="footer">
      <p>
        Powered by
        <a href="https://agiworkforce.com" target="_blank" rel="noopener noreferrer">AGI</a>
      </p>
    </div>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
