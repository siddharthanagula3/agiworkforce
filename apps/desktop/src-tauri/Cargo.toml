[package]
name = "agiworkforce-desktop"
version = "1.0.3"
edition = "2021"
authors = ["AGI Automation LLC"]
description = "AGI Workforce desktop shell"

[lints.rust]



warnings = "warn"
unsafe_code = "warn"  
unused = "deny"
unused_imports = "deny"
unused_variables = "deny"
unused_mut = "deny"
dead_code = "deny"
unused_attributes = "deny"
unused_qualifications = "allow"  
unused_results = "allow"  

[dependencies]

tauri = { version = "2.9.3", features = ["tray-icon", "devtools", "test"] }
tauri-plugin-shell = "2.3.3"
tauri-plugin-process = "2.2.0"
tauri-plugin-fs = "2.4.4"
tauri-plugin-dialog = "2.4.2"
tauri-plugin-updater = "2.3.0"
tauri-plugin-notification = "2.3.3"
tauri-plugin-clipboard-manager = "2.3.2"
tauri-plugin-window-state = "2.4.1"
tauri-plugin-global-shortcut = "2.3.0"





tokio = { version = "1.37", features = ["full"] }
tokio-util = { version = "0.7", features = ["codec", "compat"] }
tokio-stream = "0.1"
futures = "0.3"
futures-util = "0.3"
async-trait = "0.1"


serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"

once_cell = "1.19"
shlex = "1.3"



anyhow = "1.0"
thiserror = "1.0"


rusqlite = { version = "0.31", features = ["bundled", "backup", "blob", "chrono"] }
tokio-rusqlite = "0.5"
tokio-postgres = { version = "0.7", features = ["with-serde_json-1", "with-chrono-0_4", "with-uuid-1"] }
postgres-types = { version = "0.2", features = ["derive", "with-serde_json-1", "with-chrono-0_4", "with-uuid-1"] }
deadpool-postgres = "0.13"
mysql_async = "0.34"
mongodb = "2.8"
redis = { version = "0.32.7", features = ["aio", "tokio-comp", "connection-manager"] }
bson = "2.9"


reqwest = { version = "0.12", features = ["json", "stream", "rustls-tls", "multipart"], default-features = false }
reqwest-middleware = "0.3"
reqwest-retry = "0.5"
urlencoding = "2.1"
mime_guess = "2.0"
bytes = "1.5"


oauth2 = "4.4"


enigo = { version = "0.6", features = ["serde"] }
xcap = "0.0.12"
arboard = "3.4"


portable-pty = "0.8"
which = "6.0"


keyring = "2.3"
argon2 = "0.5"
sha2 = "0.10"
aes-gcm = "0.10"
base64 = "0.22"
rand = "0.8"
pbkdf2 = { version = "0.12", features = ["simple"] }
hmac = "0.12"
hex = "0.4"


image = { version = "0.25", features = ["png", "jpeg", "webp"] }
imageproc = "0.25"


tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
tracing-appender = "0.2"
sentry = { version = "0.33", optional = true }


webrtc = { version = "0.9", optional = true }
tokio-tungstenite = "0.21"


tungstenite = "0.21"
url = "2.5"


uuid = { version = "1.8", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
chrono-tz = "0.8"
cron = "0.12"


config = "0.14"
toml = "0.8"
serde_yaml = "0.9"


notify = "6.1"
walkdir = "2.5"
glob = "0.3"
dirs = "5.0"


regex = "1.10"
unicode-segmentation = "1.11"


rayon = "1.10"
dashmap = "5.5"
parking_lot = "0.12"
sysinfo = "0.30"
tiktoken-rs = "0.5.9"
lazy_static = "1.4"
libc = "0.2"


flate2 = "1.0"
zip = "0.6"


pdf-extract = "0.5"
lopdf = "0.32"
roxmltree = "0.20"
calamine = "0.21"


docx-rs = "0.4"              
rust_xlsxwriter = "0.77"      
printpdf = "0.7"             


tempfile = "3.10"


tesseract = { version = "0.15", optional = true }


llama-cpp-2 = { version = "0.1", optional = true }


async-imap = "0.9"
tokio-native-tls = "0.3"
lettre = { version = "0.11", features = ["tokio1-native-tls", "builder", "smtp-transport"] }
mailparse = "0.15"


rmcp = { version = "0.8", features = ["server", "client", "transport-io"] }


git2 = { version = "0.18", features = ["vendored-openssl"] }
async-stripe = { version = "0.31", features = ["runtime-tokio-hyper"] }
tauri-plugin-deep-link = "2.4.5"


[target.'cfg(windows)'.dependencies]
windows = { version = "0.56", features = [
    "Win32_Foundation",
    "Win32_System_Threading",
    "Win32_UI_WindowsAndMessaging",
    "Win32_UI_Input_KeyboardAndMouse",
    "Win32_UI_Accessibility",
    "Win32_Graphics_Gdi",
    "Win32_Graphics_Dxgi",
    "Win32_Graphics_Direct3D11",
    "Win32_System_Com",
    "Win32_System_DataExchange",
    "Win32_System_Ole",
    "Win32_UI_Shell",
    "Win32_Security",
    "Win32_System_Memory",
    "Win32_System_SystemServices",
    "Media_SpeechRecognition",
    "Storage_Streams",
    "Globalization"
] }

[target.'cfg(target_os = "macos")'.dependencies]
accessibility-sys = "0.1.2"
core-foundation = "0.9"
core-graphics = "0.24"
objc = "0.2"
cocoa = "0.25"


[features]
default = []
ocr = ["tesseract"]
local-llm = ["llama-cpp-2"]
webrtc-support = ["webrtc"]
sentry = ["dep:sentry"]
billing = []  


[build-dependencies]
tauri-build = { version = "2.5.2", features = [] }

[dev-dependencies]
tempfile = "3.10"
mockall = "0.12"
serial_test = "3.0"
criterion = "0.5"
proptest = "1.4"




[[bench]]
name = "automation_benchmarks"
harness = false

[[bench]]
name = "agi_benchmarks"
harness = false
