[package]
name = "agiworkforce-desktop"
version = "1.1.5"
edition = "2021"
authors = ["AGI Automation LLC"]
description = "AGI Workforce desktop shell"
license = "Proprietary"
default-run = "agiworkforce-desktop"

[lints.rust]
warnings = "warn"
unsafe_code = "deny"
unused = "deny"
unused_imports = "deny"
unused_variables = "deny"
unused_mut = "deny"
dead_code = "deny"
unused_attributes = "deny"
unused_qualifications = "allow"
unused_results = "allow"

[lints.clippy]
await_holding_lock = "allow"

[dependencies]

tauri = { version = "2.9.3", features = ["tray-icon"] }
tauri-plugin-shell = { version = "2.3.3", optional = true }
tauri-plugin-process = "2.2.0"
tauri-plugin-fs = "2.4.4"
tauri-plugin-dialog = "2.6.0"
tauri-plugin-updater = { version = "2.3.0", optional = true }
tauri-plugin-notification = "2.3.3"
tauri-plugin-clipboard-manager = "2.3.2"
tauri-plugin-window-state = "2.4.1"
tauri-plugin-global-shortcut = "2.3.0"





tokio = { version = "1.37", features = ["full"] }
tokio-util = { version = "0.7", features = ["codec", "compat"] }
tokio-stream = "0.1"
futures = "0.3"
futures-util = "0.3"
async-trait = "0.1"


serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"

once_cell = "1.19"
shlex = "1.3"



anyhow = "1.0"
thiserror = "2.0"


# Note: bundled-sqlcipher requires libclang at build time on some platforms.
# Install via: brew install llvm (macOS) or apt install libclang-dev (Linux).
rusqlite = { version = "0.31", features = ["bundled-sqlcipher", "backup", "blob", "chrono"] }
tokio-rusqlite = "0.5"
tokio-postgres = { version = "0.7", features = ["with-serde_json-1", "with-chrono-0_4", "with-uuid-1"], optional = true }
postgres-types = { version = "0.2", features = ["derive", "with-serde_json-1", "with-chrono-0_4", "with-uuid-1"], optional = true }
deadpool-postgres = { version = "0.13", optional = true }
mysql_async = { version = "0.34", optional = true }
mongodb = { version = "3.5", optional = true }
redis = { version = "0.32.7", features = ["aio", "tokio-comp", "connection-manager"], optional = true }
bson = { version = "2.9", optional = true }


# HIGH-008: "blocking" feature removed — refresh_oauth_token is now async.
reqwest = { version = "0.12", features = ["json", "stream", "rustls-tls", "rustls-tls-native-roots", "multipart"], default-features = false }
reqwest-middleware = "0.3"
reqwest-retry = "0.5"
urlencoding = "2.1"
mime_guess = "2.0"
bytes = "1.5"


oauth2 = "4.4"


enigo = { version = "0.6", features = ["serde"] }
rdev = "0.5"
xcap = "0.0.12"
arboard = "3.4"


portable-pty = "0.8"
which = "6.0"


# Audio capture and voice activity detection
cpal = "0.15"
# WebRTC VAD - simple and reliable voice activity detection
# Note: As an alternative to Silero VAD via ONNX, webrtc-vad is simpler to integrate
webrtc-vad = { version = "0.4", optional = true }
# Local speech-to-text with Whisper.cpp (offline transcription)
whisper-rs = { version = "0.11", optional = true }
# For extracting Piper binary archives
tar = "0.4"

# keyring for OS-level secure credential storage (macOS Keychain, Windows Credential Manager, Linux Secret Service)
keyring = "3"
argon2 = "0.5"
machine-uid = "0.3"  # For getting machine-unique identifiers
hostname = "0.4"     # For getting machine hostname as part of key derivation salt
sha2 = "0.10"
subtle = "2"
aes-gcm = "0.10"
base64 = "0.22"
rand = "0.8"
pbkdf2 = { version = "0.12", features = ["simple"] }
hmac = "0.12"
hex = "0.4"
ed25519-dalek = { version = "2.1", features = ["pkcs8", "rand_core"] } # For update signature verification


image = { version = "0.25", features = ["png", "jpeg", "webp"] }
imageproc = "0.26.1"


tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
tracing-appender = "0.2"
sentry = { version = "0.33", optional = true }


webrtc = { version = "0.14", optional = true }
tokio-tungstenite = "0.21"


tungstenite = "0.21"
url = "2.5"


uuid = { version = "1.8", features = ["v4", "v5", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
chrono-tz = "0.10"
cron = "0.12"
tokio-cron-scheduler = "0.15"


config = "0.14"
toml = "0.8"
serde_yaml = "0.9"


notify = "6.1"
walkdir = "2.5"
glob = "0.3"
dirs = "5.0"


regex = "1.10"
unicode-segmentation = "1.11"


rayon = "1.10"
dashmap = "6.1"
parking_lot = "0.12"
sysinfo = "0.30"
tiktoken-rs = "0.9.1"
lazy_static = "1.4"
libc = "0.2"


flate2 = "1.0"
zip = "1"


pdf-extract = "0.10"
lopdf = "0.32"
roxmltree = "0.20"
calamine = "0.21"


docx-rs = "0.4"              
rust_xlsxwriter = "0.77"      
printpdf = "0.7"             


tempfile = "3.10"


tesseract = { version = "0.15", optional = true }


llama-cpp-2 = { version = "0.1", optional = true }


async-imap = "0.9"
tokio-native-tls = "0.3"
lettre = { version = "0.11", features = ["tokio1-native-tls", "builder", "smtp-transport"] }
mailparse = "0.15"


git2 = { version = "0.20", features = ["vendored-openssl"] }
async-stripe = { version = "0.31", features = ["runtime-tokio-hyper"] }
tauri-plugin-deep-link = "2.4.6"


[target.'cfg(windows)'.dependencies]
windows = { version = "0.56", features = [
    "Win32_Foundation",
    "Win32_System_Threading",
    "Win32_UI_WindowsAndMessaging",
    "Win32_UI_Input_KeyboardAndMouse",
    "Win32_UI_Accessibility",
    "Win32_Graphics_Gdi",
    "Win32_Graphics_Dxgi",
    "Win32_Graphics_Direct3D11",
    "Win32_System_Com",
    "Win32_System_DataExchange",
    "Win32_System_Ole",
    "Win32_UI_Shell",
    "Win32_Security",
    "Win32_System_Memory",
    "Win32_System_SystemServices",
    "Win32_System_Registry",
    "Win32_System_Power",
    "Media_SpeechRecognition",
    "Storage_Streams",
    "Globalization"
] }

[target.'cfg(target_os = "macos")'.dependencies]
accessibility-sys = "0.1.2"
core-foundation = "0.9"
core-graphics = "0.24"
objc = "0.2"
cocoa = "0.25"


[features]
default = ["shell", "updater", "billing", "vad"]
# devtools: enable only for development — cargo build --features devtools
# remote-databases: enable only when user needs external DB connections — cargo build --features remote-databases
devtools = ["tauri/devtools"]
# Note: "ocr" feature requires Tesseract to be installed on the system
# Enable with: cargo build --features ocr
# Install Tesseract: brew install tesseract (macOS) or apt install tesseract-ocr libtesseract-dev (Linux)
ocr = ["tesseract"]
local-llm = ["llama-cpp-2"]
webrtc-support = ["webrtc"]
sentry = ["dep:sentry"]
billing = []
shell = ["dep:tauri-plugin-shell"]
updater = ["dep:tauri-plugin-updater"]
# Voice Activity Detection with WebRTC VAD
vad = ["dep:webrtc-vad"]
# Local Whisper STT (offline speech-to-text)
# Requires whisper.cpp to be built - see whisper-rs docs
local-whisper = ["dep:whisper-rs"]
# Remote database clients (PostgreSQL, MySQL, MongoDB, Redis)
# These add significant binary size; only enable if the user needs to connect to remote databases.
remote-databases = ["dep:tokio-postgres", "dep:postgres-types", "dep:deadpool-postgres", "dep:mysql_async", "dep:mongodb", "dep:redis", "dep:bson"]



[build-dependencies]
tauri-build = { version = "2.5.2", features = [] }

[dev-dependencies]
tempfile = "3.10"
mockall = "0.12"
serial_test = "3.0"
tauri = { version = "2.9.3", features = ["test"] }
criterion = "0.5"
proptest = "1.4"




[[bench]]
name = "automation_benchmarks"
harness = false

[[bench]]
name = "agi_benchmarks"
harness = false
