name: Build & Upload Windows Installer

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to upload to (e.g., v1.1.5). Leave blank to use the latest release.'
        required: false
        type: string

permissions:
  contents: write

env:
  RUST_VERSION: '1.94.0'
  NODE_VERSION: '22'
  PNPM_VERSION: '9.15.3'

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Resolve release tag
        id: resolve-tag
        shell: bash
        run: |
          if [ -n "${{ inputs.release_tag }}" ]; then
            echo "tag=${{ inputs.release_tag }}" >> $GITHUB_OUTPUT
          else
            TAG=$(curl -sf \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/releases/latest" \
              | grep '"tag_name"' | head -1 | sed 's/.*"tag_name": *"\([^"]*\)".*/\1/')
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
            echo "Resolved latest release tag: ${TAG}"
          fi

      - name: Get release ID
        id: get-release
        shell: bash
        run: |
          TAG="${{ steps.resolve-tag.outputs.tag }}"
          RELEASE_DATA=$(curl -sf \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}")
          RELEASE_ID=$(echo "$RELEASE_DATA" | grep '"id"' | head -1 | tr -d ' "id:,')
          echo "release_id=${RELEASE_ID}" >> $GITHUB_OUTPUT
          echo "Release ID for ${TAG}: ${RELEASE_ID}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}

      # LLVM/Clang is pre-installed on windows-latest at C:\Program Files\LLVM
      # Required for rusqlite bundled-sqlcipher (uses bindgen at compile time)
      - name: Set LIBCLANG_PATH for SQLCipher
        shell: bash
        run: echo "LIBCLANG_PATH=C:/Program Files/LLVM/bin" >> $GITHUB_ENV

      # OpenSSL is required by rusqlite bundled-sqlcipher on Windows.
      # windows-latest has OpenSSL pre-installed via Chocolatey.
      - name: Set OpenSSL environment for SQLCipher
        shell: bash
        run: |
          OPENSSL_DIR="C:/Program Files/OpenSSL-Win64"
          if [ ! -d "$OPENSSL_DIR" ]; then
            OPENSSL_DIR="C:/Program Files/OpenSSL"
          fi
          if [ ! -d "$OPENSSL_DIR" ]; then
            OPENSSL_DIR="C:/vcpkg/installed/x64-windows"
          fi
          echo "OPENSSL_DIR=${OPENSSL_DIR}" >> $GITHUB_ENV
          echo "OPENSSL_STATIC=1" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=${OPENSSL_DIR}/lib" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=${OPENSSL_DIR}/include" >> $GITHUB_ENV
          echo "Resolved OPENSSL_DIR: ${OPENSSL_DIR}"

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
          cache-on-failure: true

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Mask Tauri signing secrets
        shell: bash
        run: |
          echo "::add-mask::${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
          echo "::add-mask::${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}"

      - name: Build web frontend
        shell: bash
        run: |
          echo "NODE_OPTIONS=--max-old-space-size=8192" >> $GITHUB_ENV
          pnpm --filter @agiworkforce/desktop run build:web

      - name: Build Tauri Windows app
        # Builds NSIS installer (.exe) and uploads directly to the GitHub release.
        # OCR feature excluded on Windows (requires Tesseract native library).
        # All other features (shell, updater, billing, devtools, vad, remote-databases) included.
        uses: tauri-apps/tauri-action@73fb865345c54760d875b94642314f8c0c894afa # v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          LIBCLANG_PATH: C:\Program Files\LLVM\bin
          CI: 'true'
        with:
          releaseId: ${{ steps.get-release.outputs.release_id }}
          args: -- --no-default-features --features shell,updater,billing,devtools,vad,remote-databases

      - name: Upload artifacts (backup / debugging)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: windows-x64-installer
          path: |
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/nsis/*.nsis.zip
            apps/desktop/src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
          retention-days: 14

      - name: Report result
        shell: bash
        run: |
          echo "Windows installer built and uploaded to release ${{ steps.resolve-tag.outputs.tag }}"
          echo "Website /download page will now serve the Windows installer automatically."
