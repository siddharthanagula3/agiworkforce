name: Build Mac App Store

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 1.0.6)'
        required: true
        default: '1.0.6'
  push:
    tags:
      - 'appstore-v*'

env:
  CARGO_TERM_COLOR: always

# Limit GITHUB_TOKEN permissions to minimum required
permissions:
  contents: read

jobs:
  validate:
    name: Validate (lint + typecheck + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.3
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Type check
        run: pnpm typecheck
      - name: Test
        run: pnpm test

  build-appstore:
    needs: validate
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.3

      - name: Setup Rust
        # H30: Standardized to actions-rust-lang/setup-rust-toolchain@v1 to match all other workflows
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: '1.90.0'
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'apps/desktop/src-tauri -> target'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Import Code Signing Certificates
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_INSTALLER_CERTIFICATE: ${{ secrets.APPLE_INSTALLER_CERTIFICATE }}
          APPLE_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # Import distribution certificate
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          rm certificate.p12

          # Import installer certificate
          echo "$APPLE_INSTALLER_CERTIFICATE" | base64 --decode > installer.p12
          security import installer.p12 -k build.keychain -P "$APPLE_INSTALLER_CERTIFICATE_PASSWORD" -T /usr/bin/productbuild
          rm installer.p12

          # Allow codesign and productbuild to access keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Build Universal Binary for App Store
        working-directory: apps/desktop
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: 'Apple Distribution: AGI AUTOMATION LLC (${{ secrets.APPLE_TEAM_ID }})'
        run: |
          cd src-tauri
          # Build with appstore feature, excluding shell, updater, and ocr (OCR requires native Tesseract which isn't bundled)
          cargo tauri build \
            --bundles app \
            --target universal-apple-darwin \
            --config tauri.appstore.conf.json \
            --no-default-features \
            --features "appstore"

      - name: Sign App Bundle
        working-directory: apps/desktop
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH="src-tauri/target/universal-apple-darwin/release/bundle/macos/AGI Workforce.app"

          codesign --deep --force --verify --verbose \
            --sign "Apple Distribution: AGI AUTOMATION LLC ($APPLE_TEAM_ID)" \
            --options runtime \
            --entitlements "src-tauri/entitlements.appstore.plist" \
            "$APP_PATH"

          # Verify signature
          codesign --verify --deep --strict --verbose=4 "$APP_PATH"

      - name: Create PKG for App Store
        working-directory: apps/desktop
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          VERSION="${{ github.event.inputs.version || '1.0.6' }}"
          APP_PATH="src-tauri/target/universal-apple-darwin/release/bundle/macos/AGI Workforce.app"
          PKG_PATH="AGI-Workforce-$VERSION.pkg"

          xcrun productbuild \
            --sign "3rd Party Mac Developer Installer: AGI AUTOMATION LLC ($APPLE_TEAM_ID)" \
            --component "$APP_PATH" /Applications \
            "$PKG_PATH"

      - name: Notarize PKG
        working-directory: apps/desktop
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          VERSION="${{ github.event.inputs.version || '1.0.6' }}"
          xcrun notarytool submit "AGI-Workforce-$VERSION.pkg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Upload PKG to App Store Connect
        if: startsWith(github.ref, 'refs/tags/appstore-v')
        working-directory: apps/desktop
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          VERSION="${{ github.event.inputs.version || '1.0.6' }}"
          xcrun altool --upload-app \
            --file "AGI-Workforce-$VERSION.pkg" \
            --type macos \
            --username "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD"

      - name: Upload PKG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: appstore-pkg
          path: apps/desktop/AGI-Workforce-*.pkg
          retention-days: 30

      - name: Cleanup Keychain
        if: always()
        run: |
          security delete-keychain build.keychain || true
