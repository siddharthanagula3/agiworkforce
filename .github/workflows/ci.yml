name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl wget file pkg-config libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libwebkit2gtk-4.1-dev libleptonica-dev libpng-dev libjpeg-dev libtiff-dev zlib1g-dev libwebp-dev tesseract-ocr libtesseract-dev

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build packages
        run: |
          pnpm --filter @agiworkforce/types build || true
          pnpm --filter @agiworkforce/utils build || true
          pnpm --filter @agiworkforce/api-gateway build
          pnpm --filter @agiworkforce/signaling-server build
          pnpm --filter @agiworkforce/extension build

      - name: Build web app
        run: pnpm --filter web build

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'apps/desktop/src-tauri -> target'
          cache-on-failure: true

      - name: Test (Rust workspace, default features)
        run: cargo test --workspace

      - name: Clippy (Rust workspace, default features)
        run: cargo clippy --workspace --all-targets -- -D warnings

  clippy-all-features:
    name: Clippy (all features, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl wget file pkg-config libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libwebkit2gtk-4.1-dev libleptonica-dev libpng-dev libjpeg-dev libtiff-dev zlib1g-dev libwebp-dev tesseract-ocr libtesseract-dev

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'apps/desktop/src-tauri -> target'
          cache-on-failure: true
          # Use separate cache key for all-features build
          key: all-features

      - name: Clippy (all features, includes optional OCR/vision)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
