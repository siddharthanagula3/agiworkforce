name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Limit GITHUB_TOKEN permissions to minimum required
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl wget file pkg-config libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libwebkit2gtk-4.1-dev libleptonica-dev libpng-dev libjpeg-dev libtiff-dev zlib1g-dev libwebp-dev tesseract-ocr libtesseract-dev libasound2-dev xvfb

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Setup test environment
        run: |
          echo "VITE_SUPABASE_URL=https://test.supabase.co" >> $GITHUB_ENV
          echo "VITE_SUPABASE_ANON_KEY=test-anon-key" >> $GITHUB_ENV

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build packages
        run: |
          pnpm --filter @agiworkforce/types build || true
          pnpm --filter @agiworkforce/utils build || true
          pnpm --filter @agiworkforce/api-gateway build
          pnpm --filter @agiworkforce/signaling-server build
          pnpm --filter @agiworkforce/extension build

      - name: Build web app
        run: pnpm --filter web build

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'apps/desktop/src-tauri -> target'
          cache-on-failure: true

      - name: Test (Rust workspace, default features)
        run: xvfb-run --auto-servernum cargo test --workspace --lib -- --skip enigo --skip AutomationService --skip automation

      - name: Clippy (Rust workspace, default features)
        run: cargo clippy --workspace --lib -- -D warnings

  desktop-e2e:
    name: Desktop E2E (deterministic mocks)
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: apps/desktop
        run: pnpm exec playwright install --with-deps

      - name: Build desktop web frontend
        working-directory: apps/desktop
        env:
          CI: true
        run: pnpm build:web

      - name: Start Vite dev server
        working-directory: apps/desktop
        run: |
          set -euo pipefail
          VITE_DEV_PORT=5175 TAURI_DEV_HOST=127.0.0.1 pnpm dev:vite > app.log 2>&1 &
          echo $! > app.pid
          echo "Started Vite server with PID $(cat app.pid)"

      - name: Wait for app
        working-directory: apps/desktop
        run: |
          set -euo pipefail
          for i in {1..90}; do
            if ! kill -0 "$(cat app.pid)" > /dev/null 2>&1; then
              echo "Vite process exited before app became ready"
              tail -200 app.log || true
              exit 1
            fi
            if curl -fsS http://127.0.0.1:5175/ > /dev/null; then
              echo "App is ready after $((i*2))s"
              exit 0
            fi
            sleep 2
          done
          echo "App failed to start"
          tail -200 app.log || true
          exit 1

      - name: Run deterministic Playwright suite
        working-directory: apps/desktop
        env:
          CI: true
          E2E_MOCK_SUPABASE: '1'
          E2E_MOCK_LLM: '1'
        run: |
          pnpm exec playwright test \
            --project=smoke \
            --project=self-healing \
            --retries=2 \
            --workers=1

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/desktop/playwright-report
          retention-days: 14

      - name: Stop Vite dev server
        if: always()
        run: |
          if [ -f apps/desktop/app.pid ]; then
            kill $(cat apps/desktop/app.pid) 2>/dev/null || true
          fi

  clippy-all-features:
    name: Clippy (all features, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl wget file pkg-config libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libwebkit2gtk-4.1-dev libleptonica-dev libpng-dev libjpeg-dev libtiff-dev zlib1g-dev libwebp-dev tesseract-ocr libtesseract-dev libasound2-dev xvfb

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'apps/desktop/src-tauri -> target'
          cache-on-failure: true
          # Use separate cache key for all-features build
          key: all-features

      - name: Clippy (all features, includes optional OCR/vision)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
