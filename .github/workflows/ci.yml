name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/ISSUE_TEMPLATE/**'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Limit GITHUB_TOKEN permissions to minimum required
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl wget file pkg-config libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libwebkit2gtk-4.1-dev libleptonica-dev libpng-dev libjpeg-dev libtiff-dev zlib1g-dev libwebp-dev tesseract-ocr libtesseract-dev libasound2-dev xvfb libclang-dev

      - uses: pnpm/action-setup@v5
        with:
          version: 9.15.3

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup test environment
        run: |
          # Desktop app (Vite) uses VITE_ prefix
          echo "VITE_SUPABASE_URL=https://test.supabase.co" >> $GITHUB_ENV
          echo "VITE_SUPABASE_ANON_KEY=test-anon-key" >> $GITHUB_ENV
          # Web app (Next.js) uses NEXT_PUBLIC_ prefix
          echo "NEXT_PUBLIC_SUPABASE_URL=https://test.supabase.co" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=test-anon-key" >> $GITHUB_ENV

      - name: Dependency audit (JS) — critical (blocking)
        run: pnpm audit --audit-level=critical

      - name: Dependency audit (JS) — high (blocking, FIX-043)
        run: pnpm audit --audit-level=high

      - name: Lint
        # H24: --max-warnings=0 enforced via package.json lint script
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck:all

      - name: Test
        run: pnpm test

      - name: Build packages
        run: |
          pnpm --filter @agiworkforce/api-gateway build
          pnpm --filter @agiworkforce/signaling-server build
          pnpm --filter @agiworkforce/extension build

      - name: Build web app
        run: pnpm --filter web build

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: '1.94.0'
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'apps/desktop/src-tauri -> target'
          cache-on-failure: true
          cache-directories: ~/.cargo/bin

      - name: Ensure clippy is available
        run: rustup component add clippy --toolchain 1.94.0

      # H41: Verify exact Rust toolchain version before running clippy/tests
      - name: Verify Rust toolchain
        run: rustup show active-toolchain && rustc --version && cargo --version

      - name: Dependency audit (Rust) — critical (blocking)
        run: cargo install cargo-audit --version 0.22.1 --locked --quiet && cargo audit --deny warnings
        env:
          CARGO_HOME: ~/.cargo

      - name: Dependency audit (Rust) — high (blocking, FIX-043)
        run: cargo audit
        env:
          CARGO_HOME: ~/.cargo

      - name: Test (Rust workspace, default features)
        # FIX-039 (Sprint 4): the previous form skipped enigo /
        # AutomationService / automation suites. They were silenced under
        # the assumption that they need DISPLAY — but xvfb-run is already
        # set up at the CI step level, so they can run. If a specific test
        # genuinely needs a real DE, mark it `#[ignore]` at the test level
        # rather than blanket-skipping with `--skip <substring>`.
        env:
          # agiworkforce-linux-sandbox/build.rs panics if vendored
          # bubblewrap source isn't checked out. CI doesn't ship the
          # vendor/ tree, and runtime sandboxing uses the system bwrap
          # binary (not the compile-time-vendored one), so unit tests
          # don't need it. The build.rs already honours this opt-out.
          AGIWORKFORCE_SKIP_VENDORED_BWRAP: '1'
          # actions-rust-lang/setup-rust-toolchain@v1 sets
          # `RUSTFLAGS=-D warnings` by default, which turns every unused
          # import / dead_code warning across the workspace into a test
          # build failure even though they have nothing to do with whether
          # the tests pass. Lint cleanliness is enforced separately by the
          # Clippy step below; keep the Test step focused on test outcomes.
          RUSTFLAGS: ''
        run: xvfb-run --auto-servernum cargo test --workspace --lib

      - name: Clippy (apps/desktop + apps/cli, default features)
        # Scope clippy to the binaries we actually ship. The 100+ ported
        # codex-rs crates under crates/* legitimately use unsafe (PTY,
        # exec policy, etc.) and would fail `-D unsafe-code` even though
        # they're well-vetted upstream. M28: -D warnings matches the
        # apps/desktop/src-tauri/Cargo.toml [lints] table; keeps CI and
        # local linting consistent for the surface that actually runs.
        run: cargo clippy -p agiworkforce-desktop -p agiworkforce-cli --lib -- -D warnings -D unsafe-code

      - name: Tauri IPC wiring (FIX-023)
        # Catches two regressions:
        #   1. Frontend invoke('foo') where lib.rs has no `foo` registered.
        #   2. #[tauri::command] fn defined in src-tauri but missing from
        #      the generate_handler!{} list (silently dead — a frontend
        #      invoke would fail at runtime instead of compile time).
        run: bash apps/desktop/check-wiring.sh

  desktop-e2e:
    name: Desktop E2E (deterministic mocks)
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 30
    env:
      # Keep deterministic-mock E2E independent of repository secrets.
      VITE_SUPABASE_URL: https://test.supabase.co
      VITE_SUPABASE_ANON_KEY: test-anon-key
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 9.15.3

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: apps/desktop
        run: pnpm exec playwright install --with-deps

      - name: Build desktop web frontend
        working-directory: apps/desktop
        env:
          CI: true
        run: pnpm build:web

      - name: Start Vite dev server
        working-directory: apps/desktop
        run: |
          set -euo pipefail
          VITE_DEV_PORT=5175 TAURI_DEV_HOST=127.0.0.1 pnpm dev:vite > app.log 2>&1 &
          echo $! > app.pid
          echo "Started Vite server with PID $(cat app.pid)"

      - name: Wait for app
        working-directory: apps/desktop
        run: |
          set -euo pipefail
          for i in {1..90}; do
            if ! kill -0 "$(cat app.pid)" > /dev/null 2>&1; then
              echo "Vite process exited before app became ready"
              tail -200 app.log || true
              exit 1
            fi
            if curl -fsS http://127.0.0.1:5175/ > /dev/null; then
              echo "App is ready after $((i*2))s"
              exit 0
            fi
            sleep 2
          done
          echo "App failed to start"
          tail -200 app.log || true
          exit 1

      - name: Run deterministic Playwright suite
        working-directory: apps/desktop
        env:
          CI: true
          E2E_MOCK_SUPABASE: '1'
          E2E_MOCK_LLM: '1'
        run: |
          pnpm exec playwright test \
            --project=smoke \
            --project=self-healing \
            --retries=2 \
            --workers=1

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/desktop/playwright-report
          retention-days: 14

      - name: Stop Vite dev server
        if: always()
        run: |
          if [ -f apps/desktop/app.pid ]; then
            kill $(cat apps/desktop/app.pid) 2>/dev/null || true
          fi

  clippy-all-features:
    name: Clippy (all features)
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl wget file pkg-config libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libwebkit2gtk-4.1-dev libleptonica-dev libpng-dev libjpeg-dev libtiff-dev zlib1g-dev libwebp-dev tesseract-ocr libtesseract-dev libasound2-dev xvfb libclang-dev

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: '1.94.0'
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'apps/desktop/src-tauri -> target'
          cache-on-failure: true
          # Use separate cache key for all-features build
          key: all-features

      - name: Ensure clippy is available
        run: rustup component add clippy --toolchain 1.94.0

      - name: Clippy (all features, includes optional OCR/vision)
        # M28: -D warnings matches [lints] table in Cargo.toml; keeps CI and local linting consistent
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # macOS smoke check: compile + clippy on the primary target platform.
  # Runs after the main check job passes to avoid wasting macOS runner minutes on bad code.
  macos-smoke:
    name: macOS Rust smoke (cargo check + clippy)
    runs-on: macos-latest
    needs: check
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: '1.94.0'
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'apps/desktop/src-tauri -> target'
          cache-on-failure: true
          key: macos-smoke

      - name: cargo check (default features, macOS)
        working-directory: apps/desktop/src-tauri
        run: cargo check --workspace

      - name: Clippy (default features, macOS)
        working-directory: apps/desktop/src-tauri
        run: cargo clippy --workspace --lib -- -D warnings -D unsafe-code

  # FIX-009 (Sprint 4): Windows-only bugs (path separators, native APIs,
  # cfg(target_os = "windows") branches) used to surface only at release
  # time when the macos/linux jobs had already passed. This smoke job
  # catches them at PR time. Released binaries can't ship without it
  # passing — see release-desktop.yml `needs: windows-smoke`.
  windows-smoke:
    name: Windows Rust smoke (cargo check + tests, --skip linux-only)
    runs-on: windows-latest
    needs: check
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: '1.94.0'
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'apps/desktop/src-tauri -> target'
          cache-on-failure: true
          key: windows-smoke

      - name: cargo check (default features, Windows)
        working-directory: apps/desktop/src-tauri
        run: cargo check --workspace

      - name: cargo test --workspace --lib (default features, Windows)
        working-directory: apps/desktop/src-tauri
        # Skip Linux-only modules (landlock, seccompiler) and DE-dependent
        # automation suites by name. Anything else must pass.
        run: cargo test --workspace --lib -- --skip landlock --skip seccomp --skip linux_sandbox

      - name: Clippy (default features, Windows)
        working-directory: apps/desktop/src-tauri
        run: cargo clippy --workspace --lib -- -D warnings -D unsafe-code
