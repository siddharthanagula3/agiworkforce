name: 'Rust Security'

# JS/TS CodeQL is handled by GitHub's default CodeQL setup.
# This workflow only runs Rust-specific security checks.

on:
  push:
    branches: [main, develop]
    paths:
      - '**/*.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
  pull_request:
    branches: [main]
    paths:
      - '**/*.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
  schedule:
    - cron: '17 4 * * 1' # Weekly on Monday at 4:17 UTC

permissions:
  contents: read

jobs:
  rust-security:
    name: Rust Security (cargo audit + clippy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl wget file pkg-config libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libwebkit2gtk-4.1-dev libleptonica-dev libpng-dev libjpeg-dev libtiff-dev zlib1g-dev libwebp-dev tesseract-ocr libtesseract-dev libasound2-dev libclang-dev

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: '1.94.0'
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'apps/desktop/src-tauri -> target'
          cache-on-failure: true

      - name: Run cargo audit (CVE scanning)
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run cargo clippy (lint as errors)
        run: cargo clippy --workspace --all-targets -- -D warnings -D unsafe-code
