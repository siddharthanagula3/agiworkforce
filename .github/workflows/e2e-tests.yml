name: E2E Tests - Comprehensive Flow Testing

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/desktop/**'
      - '.github/workflows/e2e-tests.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/desktop/**'
  workflow_dispatch:
  schedule:
    # Run nightly tests at 2 AM UTC
    - cron: '0 2 * * *'

# Limit GITHUB_TOKEN permissions to minimum required
permissions:
  contents: read

jobs:
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps
        working-directory: apps/desktop

      - name: Build desktop web frontend
        run: pnpm build:web
        working-directory: apps/desktop
        env:
          CI: true

      - name: Start Vite dev server (background)
        run: |
          set -euo pipefail
          VITE_DEV_PORT=5175 TAURI_DEV_HOST=127.0.0.1 pnpm dev:vite > app.log 2>&1 &
          echo $! > app.pid
          echo "Started Vite server with PID $(cat app.pid)"
        working-directory: apps/desktop
        timeout-minutes: 5

      - name: Wait for app to be ready (180s max)
        run: |
          set -euo pipefail
          for i in {1..90}; do
            if ! kill -0 "$(cat app.pid)" > /dev/null 2>&1; then
              echo "Vite process exited before app became ready"
              tail -200 app.log || true
              exit 1
            fi
            if curl -fsS http://127.0.0.1:5175/ > /dev/null; then
              echo "App is ready after $((i*2)) seconds"
              exit 0
            fi
            echo "Waiting for app... attempt $i/90"
            sleep 2
          done
          echo "App failed to start after 180 seconds"
          tail -200 app.log || true
          exit 1
        working-directory: apps/desktop

      - name: Run smoke E2E tests
        run: |
          pnpm exec playwright test --project=smoke \
            --reporter=html,json \
            --retries=2 \
            --workers=1
        working-directory: apps/desktop

      - name: Run chat E2E tests
        if: always()
        run: |
          pnpm exec playwright test --project=chat \
            --reporter=html,json \
            --retries=2 \
            --workers=1
        working-directory: apps/desktop

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/desktop/test-results/
          retention-days: 30

      - name: Upload test videos on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-videos
          path: apps/desktop/test-results/**/*.webm
          retention-days: 7

      - name: Upload app logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: app-logs
          path: apps/desktop/app.log
          retention-days: 7

      - name: Check test results
        if: always()
        run: |
          if [ -f apps/desktop/test-results/results.json ]; then
            FAILED=$(grep -o '"status":"failed"' apps/desktop/test-results/results.json | wc -l)
            if [ "$FAILED" -gt 0 ]; then
              echo "❌ Tests failed: $FAILED failures detected"
              exit 1
            else
              echo "✅ All tests passed"
            fi
          fi

      - name: Stop app server
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill "$(cat app.pid)" 2>/dev/null || true
          fi
        working-directory: apps/desktop
