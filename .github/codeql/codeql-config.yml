# CodeQL Configuration for AGI Workforce
# This configuration excludes test code from security scanning
# as test values are intentionally hardcoded for testing purposes.

name: 'AGI Workforce CodeQL Configuration'

# Paths to exclude from analysis
paths-ignore:
  # Test directories
  - '**/tests/**'
  - '**/*_test.rs'
  - '**/*_tests.rs'
  - '**/test_*.rs'
  - '**/__tests__/**'
  - '**/*.test.ts'
  - '**/*.test.tsx'
  - '**/*.spec.ts'
  - '**/*.spec.tsx'

  # Node modules and build artifacts
  - '**/node_modules/**'
  - '**/dist/**'
  - '**/target/**'
  - '**/.next/**'

  # Generated code
  - '**/generated/**'
  - '**/*.generated.*'

# Query filters - exclude false positive rules
query-filters:
  # Exclude hardcoded credentials rule for test files
  - exclude:
      id: rust/hardcoded-credentials
      tags:
        - test

  # Exclude from security module tests
  - exclude:
      id: rust/hardcoded-credentials
      path-regex: ".*/security/.*\\.rs$"
      within-code-block: 'fn test_.*'

  # Exclude hard-coded cryptographic value for intentional salt/pepper constants
  # These are NOT secrets - they are public salt values used in password hashing
  - exclude:
      id: rust/hard-coded-cryptographic-value
      path-regex: ".*/master_password\\.rs$"

  - exclude:
      id: rust/hard-coded-cryptographic-value
      path-regex: ".*/background_llm\\.rs$"

  # Exclude cleartext transmission for HTTPS API calls
  # reqwest uses HTTPS by default for Google AI APIs
  - exclude:
      id: rust/cleartext-transmission
      path-regex: ".*/providers/google_.*\\.rs$"

  - exclude:
      id: rust/cleartext-transmission
      path-regex: ".*/llm/.*\\.rs$"

  # Exclude cleartext logging false positives for non-sensitive stats
  - exclude:
      id: rust/cleartext-logging
      path-regex: ".*/metrics\\.rs$"

  # Exclude clear-text-storage alert for Vibe file system workspace metadata
  # localStorage stores user-authored code (NOT secrets, API keys, or credentials)
  # This is non-sensitive workspace metadata for the Vibe editor
  - exclude:
      id: js/clear-text-storage-of-sensitive-data
      path: 'apps/web/features/vibe/services/vibe-file-system.ts'
