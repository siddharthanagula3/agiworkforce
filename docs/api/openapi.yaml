  # ──────────────────────────────────────────────
  # Device
  # ──────────────────────────────────────────────
  /device/link:
    post:
      operationId: createDeviceLink
      summary: Create device linking code
      description: |
        Generates a device linking code with QR code for pairing a desktop/mobile device.
        Requires authentication. Code expires in 15 minutes.
      tags: [Device]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [device_id]
              properties:
                device_id:
                  type: string
                device_name:
                  type: string
                device_type:
                  type: string
                  enum: [desktop, mobile]
                  default: desktop
                device_fingerprint:
                  type: string
      responses:
        '200':
          description: Device link code created
          content:
            application/json:
              schema:
                type: object
                properties:
                  link_code:
                    type: string
                    description: Hex-encoded linking code
                  device_id:
                    type: string
                  verify_url:
                    type: string
                    format: uri
                  expires_at:
                    type: integer
                    description: Unix timestamp
                  qr_code_url:
                    type: string
                    description: Data URI of QR code image
        '401':
          $ref: '#/components/responses/Unauthorized'

  /device/poll:
    post:
      operationId: pollDeviceLink
      summary: Poll for device link status
      description: |
        Desktop app polls this endpoint to check if a device link code has been approved.
        Returns tokens when approved (one-time consumption).
      tags: [Device]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [device_id]
              properties:
                device_id:
                  type: string
                device_fingerprint:
                  type: string
                  description: Required for new sessions (legacy no-fingerprint path is deprecated)
      responses:
        '200':
          description: Link status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [pending, approved, expired, denied]
                  access_token:
                    type: string
                    description: Present when status is 'approved'
                  refresh_token:
                    type: string
                    description: Present when status is 'approved'
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      email:
                        type: string
                      name:
                        type: string

  /device/approve:
    post:
      operationId: approveDeviceLink
      summary: Approve device link
      description: Approves a pending device link code (called from web/mobile app)
      tags: [Device]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                approved:
                  type: boolean
      responses:
        '200':
          description: Device link approved
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ──────────────────────────────────────────────
  # Share
  # ──────────────────────────────────────────────
  /share:
    post:
      operationId: createShare
      summary: Create a shareable link
      description: Creates a shareable link for a conversation session (expires in 7 days)
      tags: [Share]
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
