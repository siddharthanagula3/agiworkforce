components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase access token

  parameters:
    ConversationId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Conversation UUID

  schemas:
    HealthCheck:
      type: object
      required: [status, timestamp, checks]
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        timestamp:
          type: string
          format: date-time
        checks:
          type: object
          properties:
            database:
              type: object
              properties:
                status:
                  type: string
                  enum: [healthy, unhealthy]
                message:
                  type: string
            stripe:
              type: object
              properties:
                status:
                  type: string
                  enum: [healthy, unhealthy]
                message:
                  type: string
            environment:
              type: object
              properties:
                status:
                  type: string
                  enum: [healthy, unhealthy]
                missingCount:
                  type: integer

    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        avatar_url:
          type: string
          format: uri
          nullable: true
        created_at:
          type: number
          description: Unix timestamp
        updated_at:
          type: number
          description: Unix timestamp
        plan:
          type: object
          properties:
            tier:
              type: string
              enum: [free, hobby, pro, max, enterprise]
            display_name:
              type: string
            status:
              type: string
              enum: [none, active, trialing, past_due, canceled, incomplete]
            current_period_end:
              type: number
              nullable: true
              description: Unix timestamp
        feature_flags:
          type: object
          properties:
            beta_features:
              type: boolean
            advanced_model_access:
              type: boolean
        credits:
          $ref: '#/components/schemas/CreditBalance'

    Subscription:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
          format: uuid
        plan_tier:
          type: string
          enum: [free, hobby, pro, max, enterprise]
        status:
          type: string
          enum: [none, active, trialing, past_due, canceled, incomplete]
        current_period_start:
          type: string
          format: date-time
        current_period_end:
          type: string
          format: date-time
        stripe_subscription_id:
          type: string
          nullable: true

    CreditBalance:
      type: object
      properties:
        object:
          type: string
          enum: [credit_balance]
        subscription:
          type: object
          properties:
            plan_tier:
              type: string
            status:
              type: string
            current_period_end:
              type: string
              format: date-time
        credits:
          type: object
          properties:
            monthly_allocated_cents:
              type: integer
            monthly_remaining_cents:
              type: integer
            monthly_used_cents:
              type: integer
            monthly_reset_at:
              type: string
              format: date-time
            seconds_until_monthly_reset:
              type: integer
            daily_limit_cents:
              type: integer
            daily_used_cents:
              type: integer
            daily_remaining_cents:
              type: integer
            daily_reset_at:
              type: string
              format: date-time
            seconds_until_daily_reset:
              type: integer
        formatted:
          type: object
          properties:
            monthly_remaining:
              type: string
              example: '$10.50'
            monthly_allocated:
              type: string
            daily_remaining:
              type: string
            daily_limit:
              type: string

    ChatCompletionRequest:
      type: object
      required: [model, messages]
      properties:
        model:
          type: string
          description: Model ID (e.g., gpt-4o, claude-sonnet-4-20250514)
        messages:
          type: array
          items:
            type: object
            required: [role, content]
            properties:
              role:
                type: string
                enum: [system, user, assistant]
              content:
                type: string
        temperature:
          type: number
          minimum: 0
          maximum: 2
          default: 1
        max_tokens:
          type: integer
          minimum: 1
        stream:
          type: boolean
          default: false
        top_p:
          type: number
          minimum: 0
          maximum: 1
        presence_penalty:
          type: number
          minimum: -2
          maximum: 2
        frequency_penalty:
          type: number
          minimum: -2
          maximum: 2

    ChatCompletionResponse:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
          enum: [chat.completion]
        created:
          type: integer
          description: Unix timestamp
        model:
          type: string
        choices:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              message:
                type: object
                properties:
                  role:
                    type: string
                    enum: [assistant]
                  content:
                    type: string
              finish_reason:
                type: string
                enum: [stop, length, content_filter]
        usage:
          type: object
          properties:
            prompt_tokens:
              type: integer
            completion_tokens:
              type: integer
            total_tokens:
              type: integer
            cost_cents:
              type: number

    Model:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
          enum: [model]
        created:
          type: integer
        owned_by:
          type: string
        permission:
          type: array
          items:
            type: object
        root:
          type: string
        parent:
          type: string
          nullable: true

    ModelEntry:
      type: object
      description: Entry from the model catalog (/api/models)
      properties:
        id:
          type: string
        name:
          type: string
        provider:
          type: string
        category:
          type: string
          enum: [chat, code, reasoning, image, video, other]
        contextWindow:
          type: integer
        maxOutputTokens:
          type: integer
          nullable: true
        pricing:
          type: object
          properties:
            inputPerMillion:
              type: number
            outputPerMillion:
              type: number
        capabilities:
          type: object
          properties:
            vision:
              type: boolean
            tools:
              type: boolean
            streaming:
              type: boolean
            thinking:
              type: boolean
            imageGen:
              type: boolean
            videoGen:
              type: boolean
            codeExecution:
              type: boolean
            search:
              type: boolean
        speed:
          type: string
          nullable: true
        quality:
          type: string
          nullable: true
        bestFor:
          type: array
          items:
            type: string
        released:
          type: string
          nullable: true

    Memory:
      type: object
      properties:
        id:
          type: string
          format: uuid
        content:
          type: string
        category:
          type: string
          nullable: true
        source:
          type: string
          enum: [mobile, desktop, web, auto]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SecurityDashboard:
      type: object
      properties:
        metrics:
          type: object
          properties:
            total_events_24h:
              type: integer
            total_events_7d:
              type: integer
            critical_events_24h:
              type: integer
            high_severity_events_24h:
              type: integer
            unique_ips_24h:
              type: integer
            unique_users_24h:
              type: integer
            by_severity:
              type: object
              additionalProperties:
                type: integer
            by_event_type:
              type: object
              additionalProperties:
                type: integer
        alerts:
          type: array
          items:
            type: object
            properties:
              alert_name:
                type: string
              triggered:
                type: boolean
              current_count:
                type: integer
              threshold:
                type: integer
              window_minutes:
                type: integer
              severity:
                type: string
                enum: [warning, critical]
        recent_critical:
          type: array
          items:
            $ref: '#/components/schemas/SecurityEvent'
        top_ips:
          type: array
          items:
            type: object
            properties:
              ip_address:
                type: string
              event_count:
                type: integer

    SecurityEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
          nullable: true
        event_type:
          type: string
          enum:
            [
              auth_failed,
              rate_limit_exceeded,
              authorization_failed,
              suspicious_activity,
              csrf_validation_failed,
              invalid_signature,
            ]
        severity:
          type: string
          enum: [low, medium, high, critical]
        ip_address:
          type: string
          nullable: true
        user_agent:
          type: string
          nullable: true
        endpoint:
          type: string
          nullable: true
        details:
          type: object
        created_at:
          type: string
          format: date-time

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [message, type]
          properties:
            message:
              type: string
            type:
              type: string
            code:
              type: string

  responses:
    Unauthorized:
      description: Authentication required or invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              message: Invalid authentication token
              type: invalid_request_error
              code: invalid_api_key

    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              message: 'Invalid request: plan must be one of hobby, pro, max'
              type: invalid_request_error
              code: validation_error

    RateLimitExceeded:
      description: Rate limit exceeded
      headers:
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
        Retry-After:
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              message: Rate limit exceeded. Please retry after 60 seconds.
              type: rate_limit_error
              code: rate_limit_exceeded
