                  type: string
                  maxLength: 200
                  default: Shared Session
                model_id:
                  type: string
                provider:
                  type: string
                messages:
                  type: array
                  items:
                    type: object
      responses:
        '201':
          description: Share created
          content:
            application/json:
              schema:
                type: object
                properties:
                  shareUrl:
                    type: string
                    format: uri
                  token:
                    type: string
                  expiresAt:
                    type: string
                    format: date-time
                  messageCount:
                    type: integer

  /share/{token}:
    get:
      operationId: getShare
      summary: Get shared session
      tags: [Share]
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Shared session data
        '404':
          description: Share not found or expired
    delete:
      operationId: deleteShare
      summary: Delete a shared session
      tags: [Share]
      security:
        - bearerAuth: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Share deleted

