openapi: 3.1.0
info:
  title: AGI Workforce API
  description: |
    API for AGI Workforce platform - provides LLM access, chat, agents, memory,
    subscription management, credit tracking, device linking, media generation,
    scheduling, and more.

    ## Authentication

    Most endpoints require authentication via Bearer token or session cookie:
    ```
    Authorization: Bearer <supabase_access_token>
    ```

    ## CSRF Protection

    State-changing endpoints (POST, PUT, DELETE) require a CSRF token in the
    `x-csrf-token` header. Obtain a token via `GET /csrf`.

    ## Rate Limiting

    All endpoints are rate-limited. Rate limit headers are included in responses:
    - `X-RateLimit-Limit`: Maximum requests per window
    - `X-RateLimit-Remaining`: Remaining requests in window
    - `X-RateLimit-Reset`: Unix timestamp when window resets

    ## Error Handling

    Errors follow a consistent format:
    ```json
    {
      "error": {
        "message": "Human-readable error message",
        "type": "error_type",
        "code": "error_code"
      }
    }
    ```
  version: 2.0.0
  contact:
    name: AGI Workforce Support
    url: https://agiworkforce.com/support
  license:
    name: Proprietary
    url: https://agiworkforce.com/terms

servers:
  - url: https://agiworkforce.com/api
    description: Production API
  - url: http://localhost:3001/api
    description: Local development

tags:
  - name: Health
    description: Service health and status
  - name: Auth
    description: Authentication and token management
  - name: User
    description: User profile and account management
  - name: Billing
    description: Subscription, checkout, and credit management
  - name: LLM
    description: Language model completion APIs
  - name: Chat
    description: Web chat conversations and messages
  - name: Agents
    description: AI agent execution and session management
  - name: Memory
    description: User memory CRUD and sync
  - name: Device
    description: Device linking and synchronization
  - name: Media
    description: Image and video generation
  - name: Schedules
    description: Scheduled task management
  - name: Share
    description: Conversation sharing
  - name: Models
    description: Model catalog
  - name: Voice
    description: Voice transcription and health
  - name: Downloads
    description: Desktop app downloads
  - name: Releases
    description: App update and release management
  - name: Admin
    description: Administrative endpoints (requires admin role)
  - name: Connectors
    description: External service connectors
  - name: Marketplace
    description: Marketplace and workforce listings
  - name: Messaging
    description: Messaging platform configuration and stats
  - name: Autotag
    description: Conversation auto-tagging and classification
  - name: GitHub
    description: GitHub integration endpoints
  - name: Webhooks
    description: Webhook receivers and diagnostics

paths:
  # ──────────────────────────────────────────────
  # Health
  # ──────────────────────────────────────────────
  /health:
    get:
      operationId: getHealth
      summary: Health check
      description: Returns the health status of the API and its dependencies (database, Stripe, environment)
      tags: [Health]
      responses:
        '200':
          description: Service is healthy or degraded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheck'
        '503':
          description: Service is unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheck'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  # ──────────────────────────────────────────────
  # CSRF
  # ──────────────────────────────────────────────
  /csrf:
    get:
      operationId: getCsrfToken
      summary: Get CSRF token
      description: |
        Returns a CSRF token that must be included in the `x-csrf-token` header
        for all state-changing requests (POST, PUT, DELETE). Token expires in 1 hour.
      tags: [Auth]
      responses:
        '200':
          description: CSRF token generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  expiresIn:
                    type: integer
                    description: Token lifetime in milliseconds (3600000 = 1 hour)

  # ──────────────────────────────────────────────
  # Auth
  # ──────────────────────────────────────────────
  /auth/desktop-token:
    post:
      operationId: getDesktopToken
      summary: Exchange credentials for desktop token
      tags: [Auth]
      responses:
        '200':
          description: Token issued
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/set-token:
    post:
      operationId: setAuthToken
      summary: Set authentication token via cookie
      tags: [Auth]
      responses:
        '200':
          description: Token set successfully

  /auth/clear-token:
    post:
      operationId: clearAuthToken
      summary: Clear authentication token cookie
      tags: [Auth]
      responses:
        '200':
          description: Token cleared

  /auth/sso-check:
    get:
      operationId: checkSso
      summary: Check SSO availability for email domain
      tags: [Auth]
      parameters:
        - name: email
          in: query
          schema:
            type: string
            format: email
      responses:
        '200':
          description: SSO availability check result

  # ──────────────────────────────────────────────
  # User
  # ──────────────────────────────────────────────
  /me:
    get:
      operationId: getMe
      summary: Get current user
      description: Returns the authenticated user's profile, subscription, feature flags, and credit balance
      tags: [User]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /user/export:
    get:
      operationId: exportUserData
      summary: Export user data (GDPR Article 20)
      description: |
        Returns all user data in JSON format for GDPR data portability.
        Add `?download=true` to receive as a downloadable file.
      tags: [User]
      security:
        - bearerAuth: []
      parameters:
        - name: download
          in: query
          schema:
            type: string
            enum: ['true', 'false']
          description: Set to 'true' to download as JSON file
      responses:
        '200':
          description: User data export
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  export_timestamp:
                    type: string
                    format: date-time
                  user_id:
                    type: string
                    format: uuid
                  data:
                    type: object
                    description: Contains profile, subscription, credit_transactions, email_preferences, device_authorizations, etc.
        '401':
          $ref: '#/components/responses/Unauthorized'

  /user/data:
    delete:
      operationId: deleteUserData
      summary: Delete user data (GDPR Article 17)
      description: |
        Permanently deletes all user data from the system (Right to Erasure).
        This is a destructive, irreversible operation. Rate limited to 3 requests per hour.
      tags: [User]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Data deletion processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  user_id:
                    type: string
                    format: uuid
                  deletion_timestamp:
                    type: string
                    format: date-time
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ──────────────────────────────────────────────
  # Billing
  # ──────────────────────────────────────────────
  /checkout:
    post:
      operationId: createCheckoutSession
      summary: Create checkout session
      description: |
        Creates a Stripe checkout session for subscription purchase.
        If user already has an active subscription, redirects to billing portal instead.
      tags: [Billing]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan, billingInterval]
              properties:
                plan:
                  type: string
                  enum: [hobby, pro, max]
                billingInterval:
                  type: string
                  enum: [monthly, annual]
      responses:
        '200':
          description: Checkout or portal session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    format: uri
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /portal:
    post:
      operationId: createPortalSession
      summary: Create billing portal session
      description: Creates a Stripe billing portal session for managing subscription, invoices, and payment methods
      tags: [Billing]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Portal session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    format: uri
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: No subscription found

  /sync-subscription:
    post:
      operationId: syncSubscription
      summary: Sync subscription with Stripe
      description: Manually triggers synchronization of subscription data with Stripe
      tags: [Billing]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Subscription synced successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  subscription:
                    $ref: '#/components/schemas/Subscription'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /credit-topup:
    post:
      operationId: createCreditTopup
      summary: Purchase additional credits
      description: |
        Creates a Stripe checkout session for a one-time credit top-up purchase.
        Amount must be between $10 (1000 cents) and $1,000 (100000 cents).
      tags: [Billing]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount_cents:
                  type: integer
                  minimum: 1000
                  maximum: 100000
                  default: 10000
                  description: Top-up amount in cents (default $100)
      responses:
        '200':
          description: Credit top-up checkout session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    format: uri
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /usage:
    get:
      operationId: getUsage
      summary: Get credit usage and balance
      description: Returns the user's current credit balance, usage percentages, and subscription info
      tags: [Billing]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Usage data retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  plan_tier:
                    type: string
                  credits_allocated_cents:
                    type: integer
                  credits_used_cents:
                    type: integer
                  credits_remaining_cents:
                    type: integer
                  usage_percentage:
                    type: number
                  period_start:
                    type: string
                    format: date-time
                    nullable: true
                  period_end:
                    type: string
                    format: date-time
                    nullable: true
                  daily_used_cents:
                    type: integer
                  daily_limit_cents:
                    type: integer
                  daily_remaining_cents:
                    type: integer
                  subscription_status:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /claim-offer:
    post:
      operationId: claimOffer
      summary: Claim a promotional offer
      tags: [Billing]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Offer claimed
        '401':
          $ref: '#/components/responses/Unauthorized'

  /stripe-webhook:
    post:
      operationId: stripeWebhook
      summary: Stripe webhook receiver
      description: Receives and processes Stripe webhook events. Authenticated via Stripe webhook signature.
      tags: [Webhooks]
      responses:
        '200':
          description: Webhook processed

  # ──────────────────────────────────────────────
  # LLM
  # ──────────────────────────────────────────────
  /llm/v1/chat/completions:
    post:
      operationId: createChatCompletion
      summary: Create chat completion (OpenAI-compatible)
      description: |
        OpenAI-compatible chat completion endpoint. Supports streaming via SSE.
        Credits are deducted based on token usage.
      tags: [LLM]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
      responses:
        '200':
          description: Chat completion response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletionResponse'
            text/event-stream:
              schema:
                type: string
                description: Server-sent events stream for streaming responses
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          description: Insufficient credits
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /llm/v1/models:
    get:
      operationId: listLlmModels
      summary: List available LLM models
      description: Returns available LLM models based on user's subscription tier
      tags: [LLM]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of available models
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                    enum: [list]
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Model'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /llm/v1/credits/balance:
    get:
      operationId: getCreditBalance
      summary: Get credit balance
      description: Returns the user's current credit balance including monthly and daily limits
      tags: [Billing]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Credit balance retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditBalance'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: No active subscription

  /llm/v1/audio/transcriptions:
    post:
      operationId: createAudioTranscription
      summary: Transcribe audio
      description: Transcribes audio file to text using an LLM audio model
      tags: [Voice]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                model:
                  type: string
      responses:
        '200':
          description: Transcription result

  /llm/v2/chat:
    post:
      operationId: createV2Chat
      summary: Chat completion (v2 enhanced)
      description: Enhanced chat completion endpoint with additional features
      tags: [LLM]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Chat response

  /llm/completion:
    post:
      operationId: createLlmCompletion
      summary: LLM completion
      description: Direct LLM completion endpoint
      tags: [LLM]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Completion response

  /completion:
    post:
      operationId: createPromptCompletion
      summary: Ghost-text prompt completion
      description: |
        Provides ghost-text prompt completions for the AI prompt box.
        Uses a fast model (claude-haiku-4.5) for inline suggestions.
      tags: [LLM]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [input]
              properties:
                input:
                  type: string
                  minLength: 1
                  maxLength: 10000
                context:
                  type: string
                  maxLength: 5000
                  nullable: true
      responses:
        '200':
          description: Prompt completion suggestion
          content:
            application/json:
              schema:
                type: object
                properties:
                  suggestion:
                    type: string
                  model:
                    type: string
                  latency_ms:
                    type: number
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ──────────────────────────────────────────────
  # Models Catalog
  # ──────────────────────────────────────────────
  /models:
    get:
      operationId: getModelCatalog
      summary: Get model catalog
      description: |
        Returns the canonical model catalog from models.json. Publicly cacheable (5 min).
        No authentication required.
      tags: [Models]
      responses:
        '200':
          description: Model catalog
          content:
            application/json:
              schema:
                type: object
                properties:
                  models:
                    type: array
                    items:
                      $ref: '#/components/schemas/ModelEntry'
                  version:
                    type: string
                  lastUpdated:
                    type: string

  # ──────────────────────────────────────────────
  # Chat Conversations
  # ──────────────────────────────────────────────
  /chat/conversations:
    get:
      operationId: listConversations
      summary: List conversations
      description: Returns user's conversations, ordered by most recently updated
      tags: [Chat]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Conversation list
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversations:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        title:
                          type: string
                        model:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createConversation
      summary: Create a conversation
      tags: [Chat]
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                model:
                  type: string
      responses:
        '201':
          description: Conversation created
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversation:
                    type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  /chat/conversations/{id}:
    get:
      operationId: getConversation
      summary: Get conversation with messages
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ConversationId'
      responses:
        '200':
          description: Conversation and messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversation:
                    type: object
                  messages:
                    type: array
                    items:
                      type: object
        '404':
          description: Conversation not found
    put:
      operationId: updateConversation
      summary: Update conversation (rename)
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ConversationId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  maxLength: 500
                model:
                  type: string
      responses:
        '200':
          description: Conversation updated
    delete:
      operationId: deleteConversation
      summary: Soft-delete conversation
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ConversationId'
      responses:
        '200':
          description: Conversation deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /chat/conversations/{id}/messages:
    post:
      operationId: sendMessage
      summary: Send a message and get AI response
      description: |
        Sends a user message to a conversation and returns the AI response.
        If `skipLlm` is true, saves the message without calling the LLM.
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ConversationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  maxLength: 100000
                model:
                  type: string
                role:
                  type: string
                  enum: [user, assistant, system]
                  default: user
                skipLlm:
                  type: boolean
                  default: false
      responses:
        '200':
          description: Messages saved and AI response generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  userMessage:
                    type: object
                  assistantMessage:
                    type: object
                  usage:
                    type: object
                    properties:
                      prompt_tokens:
                        type: integer
                      completion_tokens:
                        type: integer
                      total_tokens:
                        type: integer
        '402':
          description: Insufficient credits

  # ──────────────────────────────────────────────
  # Agents
  # ──────────────────────────────────────────────
  /agents/execute:
    post:
      operationId: executeAgent
      summary: Execute an AI agent
      description: |
        Executes an AI agent with a given prompt and employee context.
        Streams the response using SSE. Credits are checked and deducted.
      tags: [Agents]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [employeeId, message]
              properties:
                employeeId:
                  type: string
                  description: AI skill/employee ID (e.g., 'software-engineer')
                message:
                  type: string
                  maxLength: 50000
                systemPrompt:
                  type: string
                  maxLength: 10000
                conversationHistory:
                  type: array
                  maxItems: 50
                  items:
                    type: object
                    properties:
                      role:
                        type: string
                        enum: [user, assistant, system]
                      content:
                        type: string
                model:
                  type: string
                provider:
                  type: string
      responses:
        '200':
          description: SSE stream of agent response
          content:
            text/event-stream:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Insufficient credits

  /agents/session:
    post:
      operationId: manageAgentSession
      summary: Create or manage agent chat sessions
      description: Supports actions - create, list, get, delete
      tags: [Agents]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [create, list, get, delete]
                sessionId:
                  type: string
                  format: uuid
                employeeId:
                  type: string
                  maxLength: 100
                title:
                  type: string
                  maxLength: 500
      responses:
        '200':
          description: Session operation result
        '401':
          $ref: '#/components/responses/Unauthorized'

  /agents/collaboration:
    post:
      operationId: agentCollaboration
      summary: Multi-agent collaboration
      tags: [Agents]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Collaboration result

  /agents/communication:
    get:
      operationId: getAgentCommunication
      summary: Get agent communication messages
      tags: [Agents]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Communication messages
    post:
      operationId: sendAgentMessage
      summary: Send message to agent
      tags: [Agents]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Message sent

  /agents/communication/{id}:
    put:
      operationId: respondToDelegation
      summary: Respond to agent delegation
      tags: [Agents]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Response recorded

  # ──────────────────────────────────────────────
  # Memory
  # ──────────────────────────────────────────────
  /memory:
    get:
      operationId: listMemories
      summary: List user memories
      tags: [Memory]
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            maximum: 10000
            default: 0
      responses:
        '200':
          description: Memory list
          content:
            application/json:
              schema:
                type: object
                properties:
                  memories:
                    type: array
                    items:
                      $ref: '#/components/schemas/Memory'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createMemory
      summary: Create a memory
      tags: [Memory]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  maxLength: 10000
                category:
                  type: string
                source:
                  type: string
                  enum: [mobile, desktop, web, auto]
      responses:
        '201':
          description: Memory created
          content:
            application/json:
              schema:
                type: object
                properties:
                  memory:
                    $ref: '#/components/schemas/Memory'

  /memory/{id}:
    get:
      operationId: getMemory
      summary: Get a single memory
      tags: [Memory]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Memory retrieved
        '404':
          description: Memory not found
    put:
      operationId: updateMemory
      summary: Update memory content
      tags: [Memory]
      security:
        - bearerAuth: []
      parameters:
