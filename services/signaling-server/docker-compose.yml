# Docker Compose configuration for WebSocket Signaling Server
# Usage:
#   Development: docker compose --profile dev up
#   Production:  docker compose --profile prod up -d

services:
  # ===========================================================================
  # Production Service
  # ===========================================================================
  signaling-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/agiworkforce/signaling-server:latest
    container_name: signaling-server
    profiles:
      - prod
    restart: unless-stopped
    ports:
      - '${PORT:-4000}:4000'
    environment:
      NODE_ENV: production
      PORT: 4000
      SIGNALING_HOST: '0.0.0.0'
      SIGNALING_WS_PATH: '${SIGNALING_WS_PATH:-/ws}'
      SIGNALING_HTTP_URL: '${SIGNALING_HTTP_URL:-}'
      SIGNALING_WS_URL: '${SIGNALING_WS_URL:-}'
      SIGNALING_PAIRING_TTL: '${SIGNALING_PAIRING_TTL:-300}'
      ALLOWED_ORIGINS: '${ALLOWED_ORIGINS:-}'
      # Required secrets - must be set in environment or .env file
      SUPABASE_URL: '${SUPABASE_URL:?SUPABASE_URL is required}'
      SUPABASE_SERVICE_ROLE_KEY: '${SUPABASE_SERVICE_ROLE_KEY:?SUPABASE_SERVICE_ROLE_KEY is required}'
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:4000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    # Resource limits for production
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    # Security options
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777

  # ===========================================================================
  # Development Service
  # ===========================================================================
  signaling-server-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    container_name: signaling-server-dev
    profiles:
      - dev
    ports:
      - '${PORT:-4000}:4000'
    environment:
      NODE_ENV: development
      PORT: 4000
      SIGNALING_HOST: '0.0.0.0'
      SIGNALING_WS_PATH: '${SIGNALING_WS_PATH:-/ws}'
      SIGNALING_PAIRING_TTL: '${SIGNALING_PAIRING_TTL:-300}'
      ALLOWED_ORIGINS: '${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3001,http://localhost:5173}'
      SUPABASE_URL: '${SUPABASE_URL:?SUPABASE_URL is required}'
      SUPABASE_SERVICE_ROLE_KEY: '${SUPABASE_SERVICE_ROLE_KEY:?SUPABASE_SERVICE_ROLE_KEY is required}'
    volumes:
      # Mount source for hot-reload capability
      - ./src:/app/src:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
    command: ['npx', 'tsx', 'watch', 'src/index.ts']
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:4000/health']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

# ===========================================================================
# Networks
# ===========================================================================
networks:
  default:
    name: signaling-network
    driver: bridge
